<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFE3A3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Saddlebags — Pip &amp; Biscuit's Delivery Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#4A2C1A; --ink2:#7A4A21; --wood:#C98B4B; --paper:#FFF8E7; --paper2:#FFF3D6;
  --gold:#FFB627; --goldD:#C4820A; --green:#7DC95E; --greenD:#4F9A3A; --red:#E4572E;
  --safeB: env(safe-area-inset-bottom, 0px); --safeT: env(safe-area-inset-top, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#3a2c20;}
body{
  font-family:'Fredoka',-apple-system,'SF Pro Rounded',system-ui,sans-serif;
  touch-action:manipulation; user-select:none; -webkit-user-select:none;
  display:flex; justify-content:center;
}
#app{position:relative;width:100%;max-width:520px;height:100vh;height:100dvh;overflow:hidden;background:#FFE3A3;}
#cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;}
.hide{display:none !important;}

/* ---------- top bar ---------- */
#topbar{position:absolute;top:calc(var(--safeT) + 6px);left:8px;right:8px;z-index:12;
  display:flex;flex-direction:column;gap:4px;pointer-events:none;}
.tbrow{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;}
.pill{background:rgba(255,248,231,.94);border:2px solid var(--wood);border-radius:999px;
  padding:3px 11px;font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;
  box-shadow:0 2px 0 rgba(0,0,0,.12);}
.pill b{color:var(--ink2);}
.pill.gold{background:#FFF0C2;border-color:var(--goldD);}
#muteBtn{pointer-events:auto;cursor:pointer;}
#homeBtn{pointer-events:auto;cursor:pointer;}
#patwrap{height:13px;border-radius:8px;background:rgba(0,0,0,.18);overflow:hidden;
  border:2px solid rgba(122,74,33,.55);margin:0 26px;}
#patbar{height:100%;width:100%;border-radius:6px;
  background:linear-gradient(90deg,#7DC95E,#B5E655);transition:width .3s linear;}

/* ---------- buttons ---------- */
.bigbtn{display:block;width:100%;border:none;border-radius:18px;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:19px;color:#5b3300;padding:13px 18px;
  background:linear-gradient(#FFD166,#FFB627);box-shadow:0 5px 0 var(--goldD),0 8px 14px rgba(0,0,0,.22);
  margin-top:10px;letter-spacing:.3px;}
.bigbtn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--goldD);}
.bigbtn.green{background:linear-gradient(#A5E07C,#7DC95E);box-shadow:0 5px 0 var(--greenD),0 8px 14px rgba(0,0,0,.22);color:#1e4d0e;}
.bigbtn.green:active{box-shadow:0 2px 0 var(--greenD);}
.bigbtn.small{font-size:16px;padding:10px 14px;border-radius:14px;}

#departBtn{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(var(--safeB) + 10px);
  z-index:12;width:auto;min-width:210px;margin:0;}
#departBtn:active{transform:translateX(-50%) translateY(3px);}
#departBtn.warn{background:linear-gradient(#FFB08A,#F58549);box-shadow:0 5px 0 #b85410,0 8px 14px rgba(0,0,0,.22);color:#5c2200;}

/* ---------- screens ---------- */
.screen{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:18px;}
.screen.dim{background:rgba(58,32,10,.35);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.panel{background:var(--paper);border:4px solid var(--wood);border-radius:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);padding:20px 18px;width:100%;max-width:350px;
  color:var(--ink);text-align:center;animation:pop-in .3s cubic-bezier(.2,1.6,.4,1);}
@keyframes pop-in{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
h1.logo{font-size:46px;font-weight:700;color:var(--ink2);line-height:1;letter-spacing:1px;
  text-shadow:0 3px 0 #fff,0 6px 0 rgba(201,139,75,.4);}
.tagline{font-size:15px;font-weight:600;color:#a8703a;margin-top:6px;}
.statline{font-size:13.5px;color:#8a6a4a;margin-top:12px;font-weight:500;}

/* ---------- encounter card ---------- */
#card{position:absolute;left:10px;right:10px;bottom:calc(var(--safeB) + 10px);z-index:22;
  background:var(--paper);border:4px solid var(--wood);border-radius:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);padding:16px 14px 14px;color:var(--ink);
  animation:slide-up .28s cubic-bezier(.2,1.4,.4,1);max-height:72%;overflow-y:auto;}
@keyframes slide-up{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
#card .cicon{font-size:44px;text-align:center;line-height:1.1;}
#card h2{font-size:21px;text-align:center;color:var(--ink2);margin:2px 0 4px;}
#card .cdesc{font-size:14.5px;text-align:center;color:#7a5c3e;font-weight:500;margin-bottom:10px;}
.opt{display:flex;align-items:center;gap:10px;width:100%;border:3px solid var(--wood);
  background:var(--paper2);border-radius:15px;padding:9px 12px;margin-top:7px;cursor:pointer;
  font-family:inherit;text-align:left;box-shadow:0 3px 0 rgba(201,139,75,.5);}
.opt:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(201,139,75,.5);}
.opt .oe{font-size:26px;flex:0 0 auto;}
.opt .ol{flex:1;font-size:15.5px;font-weight:600;color:var(--ink);line-height:1.15;}
.opt .ol small{display:block;font-size:12px;font-weight:500;color:#a8703a;}
.opt .on{flex:0 0 auto;font-size:13px;font-weight:700;color:var(--greenD);}
.opt.risky .on{color:var(--red);}
.opt:disabled{opacity:.45;box-shadow:none;}
.outcome{font-size:15.5px;font-weight:600;text-align:center;color:var(--ink);padding:6px 2px;}
.outcome .big{font-size:22px;display:block;margin-top:4px;color:var(--greenD);}
.outcome .big.bad{color:var(--red);}

/* ---------- results ---------- */
.tally{width:100%;margin-top:10px;}
.trow{display:flex;justify-content:space-between;align-items:center;font-size:15.5px;font-weight:600;
  padding:6px 4px;border-bottom:2px dashed #e8d3ad;opacity:0;transform:translateX(-14px);}
.trow.show{animation:trow-in .35s forwards;}
@keyframes trow-in{to{opacity:1;transform:translateX(0);}}
.trow .tv{color:var(--greenD);font-weight:700;}
.trow.total{border-bottom:none;font-size:19px;color:var(--ink2);border-top:3px solid var(--wood);margin-top:4px;padding-top:9px;}
.trow.total .tv{color:var(--goldD);font-size:21px;}
.flavor{font-size:13.5px;color:#a8703a;font-weight:500;margin-top:8px;font-style:italic;}

/* ---------- shop ---------- */
#shop{position:absolute;left:0;right:0;bottom:0;top:34%;z-index:24;background:var(--paper);
  border:4px solid var(--wood);border-bottom:none;border-radius:26px 26px 0 0;
  box-shadow:0 -8px 30px rgba(0,0,0,.3);display:flex;flex-direction:column;
  animation:slide-up .3s cubic-bezier(.2,1.4,.4,1);}
#shopHead{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 6px;}
#shopHead h2{font-size:21px;color:var(--ink2);}
#shopCoins{font-size:16px;font-weight:700;color:var(--goldD);}
#shopClose{border:none;background:#F0DDB8;color:var(--ink2);font-family:inherit;font-weight:700;
  font-size:15px;border-radius:12px;padding:7px 14px;cursor:pointer;box-shadow:0 3px 0 #cbb489;}
#shopClose:active{transform:translateY(2px);box-shadow:0 1px 0 #cbb489;}
#tabs{display:flex;gap:6px;padding:4px 12px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{flex:0 0 auto;border:3px solid var(--wood);background:var(--paper2);border-radius:12px;
  font-family:inherit;font-weight:700;font-size:13.5px;color:#a8703a;padding:7px 11px;cursor:pointer;white-space:nowrap;}
.tab.on{background:var(--gold);color:#5b3300;border-color:var(--goldD);}
#shopGrid{flex:1;overflow-y:auto;padding:4px 12px calc(var(--safeB) + 16px);
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:start;}
#shopGrid.rows{grid-template-columns:1fr;}
.cell{border:3px solid var(--wood);border-radius:15px;background:var(--paper2);padding:9px 4px 7px;
  text-align:center;cursor:pointer;color:var(--ink);position:relative;}
.cell .sw{width:38px;height:38px;border-radius:50%;margin:0 auto 4px;border:3px solid rgba(0,0,0,.18);}
.cell .se{font-size:30px;line-height:38px;height:38px;margin-bottom:4px;}
.cell .nm{font-size:12.5px;font-weight:700;line-height:1.1;}
.cell .pr{font-size:12px;font-weight:700;color:var(--goldD);margin-top:3px;}
.cell.eq{border-color:var(--greenD);background:#EAF7DE;box-shadow:0 0 0 2px var(--greenD);}
.cell.eq .pr{color:var(--greenD);}
.cell.locked .pr{color:#b08a5a;}
.cell.cant{opacity:.55;}
.gearrow{display:flex;align-items:center;gap:10px;border:3px solid var(--wood);border-radius:15px;
  background:var(--paper2);padding:10px 12px;color:var(--ink);}
.gearrow .ge{font-size:30px;}
.gearrow .gi{flex:1;}
.gearrow .gi .nm{font-size:15px;font-weight:700;}
.gearrow .gi .ds{font-size:12.5px;color:#8a6a4a;font-weight:500;}
.gearrow button{border:none;border-radius:11px;font-family:inherit;font-weight:700;font-size:13.5px;
  padding:8px 12px;cursor:pointer;background:var(--gold);color:#5b3300;box-shadow:0 3px 0 var(--goldD);white-space:nowrap;}
.gearrow button:active{transform:translateY(2px);box-shadow:0 1px 0 var(--goldD);}
.gearrow button:disabled{background:#e0d0b0;color:#a08a68;box-shadow:0 3px 0 #bfae8d;}

/* ---------- toast & hint ---------- */
#toast{position:absolute;top:calc(var(--safeT) + 92px);left:50%;transform:translateX(-50%);
  z-index:30;background:rgba(60,36,14,.92);color:#FFF3D6;font-size:14.5px;font-weight:600;
  padding:9px 18px;border-radius:999px;white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity .25s;max-width:92%;text-overflow:ellipsis;overflow:hidden;}
#toast.on{opacity:1;}
#hint{position:absolute;z-index:28;left:50%;transform:translateX(-50%);width:min(310px,86%);
  background:#fff;border:3px solid var(--gold);border-radius:16px;padding:11px 14px;
  font-size:14.5px;font-weight:600;color:var(--ink);text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,.25);animation:hint-bob 1.6s ease-in-out infinite;}
@keyframes hint-bob{0%,100%{margin-top:0;}50%{margin-top:-6px;}}
#hint small{display:block;font-size:11px;color:#b08a5a;margin-top:3px;font-weight:500;}
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>

  <div id="topbar" class="hide">
    <div class="tbrow" id="tbTop"></div>
    <div class="tbrow" id="tbSub"></div>
    <div id="patwrap" class="hide"><div id="patbar"></div></div>
  </div>

  <button id="departBtn" class="bigbtn green hide">DEPART ▶</button>
  <div id="hint" class="hide"></div>
  <div id="toast"></div>

  <div id="title" class="screen">
    <div style="margin-top:calc(var(--safeT) + 12px);text-align:center;">
      <h1 class="logo">🪶 SADDLE<br>BAGS 🐴</h1>
      <div class="tagline">Pip &amp; Biscuit's Delivery Co.</div>
    </div>
    <div style="flex:1"></div>
    <div style="width:min(300px,86%);margin-bottom:calc(var(--safeB) + 18px);">
      <div class="statline" id="titleStats"></div>
      <button class="bigbtn" id="startBtn">▶ &nbsp;Start Day 1</button>
      <button class="bigbtn small" id="wardrobeBtn" style="background:linear-gradient(#EEC6F7,#CE8BE0);box-shadow:0 5px 0 #9b5cb0,0 8px 14px rgba(0,0,0,.22);color:#4d1560;">🛍️ &nbsp;Wardrobe</button>
      <button class="bigbtn small" id="soundBtn" style="background:linear-gradient(#CDEBFF,#8FC9EE);box-shadow:0 5px 0 #5b93bd,0 8px 14px rgba(0,0,0,.22);color:#0e3a5c;">🔊 &nbsp;Sound On</button>
    </div>
  </div>

  <div id="card" class="hide"></div>

  <div id="results" class="screen dim hide">
    <div class="panel">
      <div style="font-size:40px;" id="resIcon">🏁</div>
      <h2 style="font-size:22px;color:var(--ink2);" id="resTitle">Delivery complete!</h2>
      <div class="tally" id="resTally"></div>
      <div class="flavor" id="resFlavor"></div>
      <button class="bigbtn" id="resNextBtn">Next Day ▶</button>
      <button class="bigbtn small" id="resShopBtn" style="background:linear-gradient(#EEC6F7,#CE8BE0);box-shadow:0 5px 0 #9b5cb0;color:#4d1560;">🛍️ Wardrobe</button>
    </div>
  </div>

  <div id="shop" class="hide">
    <div id="shopHead">
      <h2>🛍️ Wardrobe</h2>
      <div id="shopCoins">🪙 0</div>
      <button id="shopClose">Done ✓</button>
    </div>
    <div id="tabs"></div>
    <div id="shopGrid"></div>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   SADDLEBAGS — Pip & Biscuit's Delivery Co.
   A toucan packs, a horse trots, adventures happen.
   ============================================================ */
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const randi=(a,b)=>Math.floor(rand(a,b+1));
const choice=arr=>arr[Math.floor(Math.random()*arr.length)];
const TAU=Math.PI*2;
function shuffled(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};else if(Array.isArray(r))r={tl:r[0],tr:r[1]||r[0],br:r[2]||r[0],bl:r[3]||r[1]||r[0]};
    this.moveTo(x+r.tl,y);this.arcTo(x+w,y,x+w,y+h,r.tr);this.arcTo(x+w,y+h,x,y+h,r.br);
    this.arcTo(x,y+h,x,y,r.bl);this.arcTo(x,y,x+w,y,r.tl);this.closePath();return this;};
}

/* ---------- safe storage (Safari file:// throws) ---------- */
let memStore={};
const Store={
  get(k){try{return localStorage.getItem(k);}catch(e){return memStore[k]||null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){memStore[k]=v;}}
};
const SAVE_KEY='saddlebags_v1';
function defaultSave(){return{
  coins:0, day:1, bestDay:0, totalEarned:0, deliveries:0, mute:0, tut:0,
  owned:{coat:['chestnut'],mane:['cocoa'],beak:['classic'],hat:['none'],blanket:['crimson'],trail:['none']},
  eq:{coat:'chestnut',mane:'cocoa',beak:'classic',hat:'none',blanket:'crimson',trail:'none'},
  gear:{bags:0,saddle:0,shoe:0,spy:0,pouch:0,charm:0}
};}
let SV=defaultSave();
try{const raw=Store.get(SAVE_KEY);if(raw){const p=JSON.parse(raw);SV=Object.assign(defaultSave(),p);
  SV.owned=Object.assign(defaultSave().owned,p.owned);SV.eq=Object.assign(defaultSave().eq,p.eq);
  SV.gear=Object.assign(defaultSave().gear,p.gear);}}catch(e){}
function save(){Store.set(SAVE_KEY,JSON.stringify(SV));}

/* ---------- sound (tiny webaudio synth) ---------- */
const Sound={
  ctx:null,
  ensure(){if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){this.ctx=null;}}
    if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();return this.ctx;},
  tone(type,f0,f1,dur,vol,when){const c=this.ctx;if(!c||SV.mute)return;
    const t=c.currentTime+(when||0);const o=c.createOscillator(),g=c.createGain();
    o.type=type;o.frequency.setValueAtTime(f0,t);
    if(f1&&f1!==f0)o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
    g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur+0.05);},
  noise(dur,vol,fc,when){const c=this.ctx;if(!c||SV.mute)return;
    const t=c.currentTime+(when||0);const n=Math.floor(c.sampleRate*dur);
    const buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const s=c.createBufferSource();s.buffer=buf;
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=fc||900;
    const g=c.createGain();g.gain.value=vol;
    s.connect(f);f.connect(g);g.connect(c.destination);s.start(t);},
  click(){this.tone('square',620,620,0.05,0.06);},
  pop(){this.tone('sine',340,760,0.10,0.14);},
  stow(){this.tone('sine',170,110,0.10,0.16);this.noise(0.06,0.06,600);},
  coin(n){for(let i=0;i<(n||1);i++){this.tone('square',900,900,0.05,0.05,i*0.07);this.tone('square',1350,1350,0.06,0.05,i*0.07+0.045);}},
  munch(){this.noise(0.08,0.12,500);this.noise(0.08,0.10,420,0.11);},
  whoosh(){this.noise(0.22,0.10,1600);},
  err(){this.tone('square',150,120,0.14,0.10);},
  sad(){this.tone('sawtooth',330,190,0.42,0.07);},
  heart(){this.tone('sine',660,880,0.16,0.09);},
  clip(alt){this.noise(0.035,0.08,alt?800:650);},
  fanfare(){const n=[523,659,784,1047];n.forEach((f,i)=>this.tone('triangle',f,f,0.18,0.10,i*0.09));
    this.tone('triangle',1319,1319,0.32,0.09,0.38);},
  spark(){this.tone('sine',1200,1900,0.12,0.06);}
};

/* ============================================================
   DATA — items, events, regions, cosmetics, gear
   ============================================================ */
const ITEMS={
  apple:    {e:'🍎',n:'Apple',    w:1,food:6, sell:3},
  carrot:   {e:'🥕',n:'Carrot',   w:1,food:4, sell:2},
  bread:    {e:'🥖',n:'Bread',    w:1,food:5, sell:3},
  cheese:   {e:'🧀',n:'Cheese',   w:1,        sell:4},
  sunflower:{e:'🌻',n:'Sunflower',w:1,        sell:3},
  scarf:    {e:'🧣',n:'Scarf',    w:1,        sell:4},
  hat:      {e:'🎩',n:'Fancy Hat',w:1,        sell:6},
  map:      {e:'🗺️',n:'Map',     w:1,        sell:4},
  honey:    {e:'🍯',n:'Honey',    w:1,        sell:8},
  bell:     {e:'🔔',n:'Bell',     w:1,        sell:5},
  gem:      {e:'💎',n:'Gem',      w:1,        sell:25},
  umbrella: {e:'☂️',n:'Umbrella', w:2,fw:2,   sell:5},
  lantern:  {e:'🔦',n:'Lantern',  w:2,fw:2,   sell:5},
  rope:     {e:'🪢',n:'Rope',     w:2,fw:2,   sell:5},
  trumpet:  {e:'🎺',n:'Trumpet',  w:2,fw:2,   sell:6},
  plank:    {e:'🪵',n:'Plank',    w:2,fw:2,   sell:4},
  sus:      {e:'🍈',n:'Odd Melon',w:2,fw:2,   sell:1},
  melon:    {e:'🍉',n:'Melon',    w:4,fw:2,fh:2,food:12,sell:10},
};
for(const k in ITEMS){ITEMS[k].fw=ITEMS[k].fw||1;ITEMS[k].fh=ITEMS[k].fh||1;}
const RARE_WEIGHTS={melon:0.6,gem:0.22,sus:0.35,map:0.5,hat:0.7,honey:0.85,plank:0.9,bell:0.8};

const EVENTS={
  rain:{icon:'🌧️',title:'Sudden downpour!',desc:'Fat raindrops drum on the road.',
    opts:[
      {item:'umbrella',label:'Pop the umbrella',coins:14,text:'Biscuit trots along dry and extremely smug.'},
      {item:'scarf',label:'Scarf poncho',coins:7,text:'Damp, but dignified.'},
      {risky:1,label:'Gallop through!',good:{coins:10,text:'Splash sprint! That was weirdly fun.'},bad:{heart:-1,text:'Soaked to the bone. Biscuit glares at Pip.'}},
    ]},
  goat:{icon:'🐐',title:'A grumpy goat blocks the road',desc:'It has decided this road is its road now.',
    opts:[
      {item:'apple',label:'Bribe with an apple',coins:12,text:'Crunch. The goat steps aside, satisfied.'},
      {item:'carrot',label:'Bribe with a carrot',coins:12,text:'The goat accepts your tribute and departs.'},

<script>
'use strict';
/* ============================================================
   ENGINE — canvas, layout, game state, drawing
   ============================================================ */
const cv=$('cv'), ctx=cv.getContext('2d');
let W=360,H=640,DPR=Math.min(window.devicePixelRatio||1,2.5);
function resize(){
  W=cv.clientWidth; H=cv.clientHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  computeLayout();
}
const L={};
function computeLayout(){
  L.topH=100;
  L.beltY=L.topH+58;
  L.beltH=78;
  L.itemR=30;
  const bd=(typeof SV!=='undefined')?{cols:3+(SV.gear.bags>=1?1:0),rows:3+(SV.gear.bags>=2?1:0)}:{cols:3,rows:3};
  const panW=W/2-12;
  const cell=Math.min((panW-16)/bd.cols,34);
  L.panelH=Math.round(cell*bd.rows+30);
  L.panelY=H-88-L.panelH;
  L.panL={x:8,y:L.panelY,w:panW,h:L.panelH};
  L.panR={x:W/2+4,y:L.panelY,w:panW,h:L.panelH};
  const availH=L.panelY-10-(L.beltY+L.beltH+30);
  L.packHorse={x:W*0.50,y:L.panelY-6,s:clamp(Math.min(W/430,availH/168),0.55,1.15)};
  L.homeTou={x:W*0.50,y:L.beltY-40};
  L.carryTou={x:W*0.50,y:L.beltY+L.beltH+52};
  L.groundY=H*0.72;
  L.jHorse={x:W*0.30,y:L.groundY+36,s:clamp(W/430,0.6,1)*0.92};
  L.coinTarget={x:W-46,y:34};
}
window.addEventListener('resize',resize);

/* ---------- game state ---------- */
const G={
  state:'title', t:0,
  day:SV.day, region:REGIONS[0], tier:0,
  order:[], script:[], routeIcons:[], revealN:2, routeSet:null,
  bagL:{places:[]}, bagR:{places:[]},
  mood:0, burst:0, weather:null,
  pat:50, patMax:50, patPaused:false,
  belt:[], beltTimer:0, beltOff:0, held:null,
  tou:{x:200,y:120,mode:'hover',p:0,fx:0,fy:0,tx:0,ty:0,dur:0.4,cb:null,face:1,bob:0},
  hearts:3, dayCoins:0, eventCoins:0,
  wx:0, jstate:'trot', nodeIdx:0, nodes:[], spill:false, stepT:0, stepAlt:false, celT:0,
  parts:[], shake:0, blinkT:2, idleT:0, horsePhase:0, tilt:0,
  tutStep:-1, resRows:null,
};

/* ---------- particles ---------- */
function pText(x,y,txt,color,size){G.parts.push({tp:'txt',x,y,vx:rand(-8,8),vy:-46,life:1.15,max:1.15,txt,color:color||'#4F9A3A',size:size||17});}
function pCoin(x,y,n){for(let i=0;i<n;i++)G.parts.push({tp:'coin',x:x+rand(-14,14),y:y+rand(-10,10),vx:rand(-30,30),vy:rand(-120,-40),life:1.5,max:1.5,hom:0.25+i*0.06});}
function pPoof(x,y,col){for(let i=0;i<7;i++){const a=rand(0,TAU);G.parts.push({tp:'poof',x,y,vx:Math.cos(a)*rand(20,70),vy:Math.sin(a)*rand(20,70)-20,life:0.6,max:0.6,r:rand(4,9),color:col||'rgba(255,255,255,0.9)'});}}
function pHeart(x,y,n){for(let i=0;i<(n||3);i++)G.parts.push({tp:'txt',x:x+rand(-16,16),y:y+rand(-8,8),vx:rand(-12,12),vy:-40,life:1.2,max:1.2,txt:'❤️',size:15+rand(0,6)});}
function pSpark(x,y,n){for(let i=0;i<(n||6);i++){const a=rand(0,TAU);G.parts.push({tp:'spark',x,y,vx:Math.cos(a)*rand(30,90),vy:Math.sin(a)*rand(30,90),life:0.5,max:0.5,color:choice(['#FFD166','#FFF3B0','#FFB627'])});}}
function pConfetti(){for(let i=0;i<46;i++)G.parts.push({tp:'conf',x:rand(0,W),y:rand(-80,-10),vx:rand(-25,25),vy:rand(60,140),life:2.6,max:2.6,color:choice(RAINBOW),r:rand(3,6),sp:rand(2,7)});}
function pDust(x,y){G.parts.push({tp:'poof',x,y,vx:rand(-34,-12),vy:rand(-14,-2),life:0.5,max:0.5,r:rand(3,6),color:'rgba(120,100,70,0.35)'});}
function updateParts(dt){
  for(let i=G.parts.length-1;i>=0;i--){const p=G.parts[i];
    p.life-=dt;
    if(p.tp==='coin'){
      if(p.hom>0){p.hom-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=260*dt;}
      else{const dx=L.coinTarget.x-p.x,dy=L.coinTarget.y-p.y,d=Math.hypot(dx,dy);
        p.x+=dx/d*760*dt;p.y+=dy/d*760*dt;
        if(d<24){G.parts.splice(i,1);coinPing();continue;}}
    }else if(p.tp==='conf'){p.x+=p.vx*dt+Math.sin(p.life*p.sp)*1.4;p.y+=p.vy*dt;}
    else{p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.tp==='poof'){p.vx*=0.92;p.vy*=0.92;}if(p.tp==='txt')p.vy+=14*dt;}
    if(p.life<=0)G.parts.splice(i,1);}
}
function drawParts(c){
  for(const p of G.parts){const a=clamp(p.life/p.max,0,1);
    c.save();c.globalAlpha=a;
    if(p.tp==='txt'){c.font='700 '+p.size+'px Fredoka, sans-serif';c.textAlign='center';
      if(p.color){c.lineWidth=3.5;c.strokeStyle='rgba(255,255,255,0.85)';c.strokeText(p.txt,p.x,p.y);c.fillStyle=p.color;}
      c.fillText(p.txt,p.x,p.y);}
    else if(p.tp==='coin'){c.font='16px sans-serif';c.textAlign='center';c.fillText('🪙',p.x,p.y);}
    else if(p.tp==='poof'){c.fillStyle=p.color;c.beginPath();c.arc(p.x,p.y,p.r*(0.5+a*0.8),0,TAU);c.fill();}
    else if(p.tp==='spark'){c.fillStyle=p.color;c.beginPath();c.arc(p.x,p.y,2.6*a+1,0,TAU);c.fill();}
    else if(p.tp==='conf'){c.fillStyle=p.color;c.fillRect(p.x,p.y,p.r,p.r*1.5);}
    c.restore();}
}

/* ---------- hats ---------- */
function drawHat(c,id,s){
  if(!id||id==='none')return;
  c.save();c.scale(s,s);c.lineWidth=2.5/s>3?3:2.5;c.strokeStyle='#432818';c.lineJoin='round';
  if(id==='straw'){
    c.fillStyle='#E9C46A';c.beginPath();c.ellipse(0,2,20,6,0,0,TAU);c.fill();c.stroke();
    c.beginPath();c.ellipse(0,-4,11,8,0,Math.PI,0);c.lineTo(11,2);c.lineTo(-11,2);c.closePath();c.fill();c.stroke();
    c.fillStyle='#C1442E';c.fillRect(-11,-2,22,4);
  }else if(id==='flower'){
    const cols=['#F4A9C7','#FFF3B0','#F4A9C7','#B8E0D2','#F4A9C7'];
    for(let i=0;i<5;i++){const x=-14+i*7;c.fillStyle=cols[i];
      c.beginPath();c.arc(x,0,4.4,0,TAU);c.fill();
      c.fillStyle='#FFB627';c.beginPath();c.arc(x,0,1.8,0,TAU);c.fill();}
  }else if(id==='top'){
    c.fillStyle='#23272F';c.beginPath();c.ellipse(0,2,16,4.5,0,0,TAU);c.fill();c.stroke();
    c.fillStyle='#23272F';c.beginPath();c.roundRect(-10,-18,20,20,3);c.fill();c.stroke();
    c.fillStyle='#C1442E';c.fillRect(-10,-4,20,5);
  }else if(id==='wizard'){
    c.fillStyle='#5A4FCF';c.beginPath();c.ellipse(0,2,17,5,0,0,TAU);c.fill();c.stroke();
    c.beginPath();c.moveTo(-11,2);c.quadraticCurveTo(-2,-10,3,-26);c.quadraticCurveTo(4,-12,11,2);c.closePath();c.fill();c.stroke();
    c.fillStyle='#FFD166';c.font='8px sans-serif';c.textAlign='center';c.fillText('✦',0,-8);c.fillText('✧',4,-17);
  }else if(id==='crown'){
    c.fillStyle='#FFD166';c.beginPath();
    c.moveTo(-13,2);c.lineTo(-13,-9);c.lineTo(-7,-3);c.lineTo(0,-12);c.lineTo(7,-3);c.lineTo(13,-9);c.lineTo(13,2);c.closePath();
    c.fill();c.stroke();
    c.fillStyle='#E4572E';c.beginPath();c.arc(0,-2,2.4,0,TAU);c.fill();
  }else if(id==='party'){
    c.fillStyle='#E4572E';c.beginPath();c.moveTo(-10,2);c.lineTo(0,-24);c.lineTo(10,2);c.closePath();c.fill();c.stroke();
    c.fillStyle='#FFF3B0';c.beginPath();c.arc(-3,-5,2,0,TAU);c.fill();
    c.beginPath();c.arc(4,-11,2,0,TAU);c.fill();
    c.fillStyle='#7FD8C9';c.beginPath();c.arc(0,-24,4,0,TAU);c.fill();c.stroke();
  }else if(id==='bow'){
    c.fillStyle='#F06292';
    c.beginPath();c.moveTo(-2,-2);c.lineTo(-14,-10);c.lineTo(-12,5);c.closePath();c.fill();c.stroke();
    c.beginPath();c.moveTo(2,-2);c.lineTo(14,-10);c.lineTo(12,5);c.closePath();c.fill();c.stroke();
    c.fillStyle='#E4572E';c.beginPath();c.arc(0,-2,4,0,TAU);c.fill();c.stroke();

  c.restore();
}

/* ---------- BISCUIT the horse ---------- */
function drawHorse(c,x,y,s,o){
  o=o||{};
  const coat=COATS[o.coat||SV.eq.coat]||COATS.chestnut;
  const mane=MANES[o.mane||SV.eq.mane]||MANES.cocoa;
  const hat=o.hat!==undefined?o.hat:SV.eq.hat;
  const ph=o.phase||0, mv=o.moving?1:0, idle=o.idleT||0;
  const bob=mv?Math.abs(Math.sin(ph))*3.4:Math.sin(idle*1.7)*1.6;
  const rest=o.resting;
  c.save();c.translate(x,y);
  if(o.tilt)c.rotate(o.tilt);
  c.scale(s,s);c.translate(0,-bob);
  c.lineWidth=3;c.strokeStyle='#432818';c.lineJoin='round';c.lineCap='round';
  // tail
  const tw=Math.sin(idle*2.1+1)*0.14+(mv?Math.sin(ph*0.5)*0.1:0);
  c.save();c.translate(-52,-94);c.rotate(tw);
  c.fillStyle=(mane.pat==='rainbow')?RAINBOW[3]:mane.a;
  c.beginPath();c.moveTo(0,-4);
  c.quadraticCurveTo(-22,8,-19,40);c.quadraticCurveTo(-12,46,-8,38);
  c.quadraticCurveTo(-11,18,4,6);c.closePath();c.fill();c.stroke();
  if(mane.pat==='rainbow'){c.save();c.clip();for(let i=0;i<5;i++){c.fillStyle=RAINBOW[i];c.fillRect(-24,-6+i*10,30,10);}c.restore();c.stroke();}
  c.restore();
  // far legs
  const legLen=54;
  function leg(hx,ang,col){
    const sw=mv?Math.sin(ang)*0.42:0;
    c.save();c.translate(hx,-56);c.rotate(sw);
    c.fillStyle=col;c.beginPath();c.roundRect(-5.5,-2,11,legLen+2,5.5);c.fill();c.stroke();
    c.fillStyle='#3B2417';c.beginPath();c.roundRect(-6.5,legLen-9,13,10,3);c.fill();
    c.restore();
  }
  if(!rest){
    leg(-32,ph+Math.PI+0.4,coat.b);
    leg(30,ph+Math.PI,coat.b);
  }
  // body
  c.fillStyle=coat.a;c.beginPath();c.ellipse(0,-82,55,31,0,0,TAU);c.fill();c.stroke();
  if(coat.pat==='dapple'){c.save();c.beginPath();c.ellipse(0,-82,55,31,0,0,TAU);c.clip();
    c.fillStyle='rgba(255,255,255,0.4)';
    [[-30,-88,7],[-12,-72,6],[8,-90,8],[26,-76,6],[-2,-98,5],[38,-92,5],[-42,-74,5]].forEach(d=>{c.beginPath();c.arc(d[0],d[1],d[2],0,TAU);c.fill();});c.restore();}
  if(coat.pat==='pinto'){c.save();c.beginPath();c.ellipse(0,-82,55,31,0,0,TAU);c.clip();
    c.fillStyle=coat.c;
    c.beginPath();c.ellipse(-24,-92,20,15,0.4,0,TAU);c.fill();
    c.beginPath();c.ellipse(22,-70,18,13,-0.3,0,TAU);c.fill();c.restore();}
  // belly highlight
  c.save();c.globalAlpha=0.18;c.fillStyle='#fff';c.beginPath();c.ellipse(-4,-98,40,12,0.05,0,TAU);c.fill();c.restore();
  // near legs
  if(!rest){
    leg(-26,ph+0.4,coat.a);
    leg(36,ph,coat.a);
  }else{
    // folded legs
    c.fillStyle=coat.a;c.beginPath();c.roundRect(-44,-62,36,14,7);c.fill();c.stroke();
    c.beginPath();c.roundRect(12,-62,36,14,7);c.fill();c.stroke();
  }
  // mane — one flowing scalloped shape hugging the crest (drawn behind neck)
  c.fillStyle=(mane.pat==='rainbow')?RAINBOW[2]:mane.a;
  c.beginPath();
  c.moveTo(52,-136);
  c.lineTo(41,-149);
  c.quadraticCurveTo(27,-147,29,-133);
  c.quadraticCurveTo(15,-131,18,-117);
  c.quadraticCurveTo(5,-114,11,-101);
  c.quadraticCurveTo(13,-92,26,-95);
  c.closePath();c.fill();c.stroke();
  if(mane.pat==='rainbow'){c.save();c.beginPath();
    c.moveTo(52,-136);c.lineTo(41,-149);c.quadraticCurveTo(27,-147,29,-133);
    c.quadraticCurveTo(15,-131,18,-117);c.quadraticCurveTo(5,-114,11,-101);
    c.quadraticCurveTo(13,-92,26,-95);c.closePath();c.clip();
    for(let i=0;i<5;i++){c.fillStyle=RAINBOW[i];
      c.beginPath();c.moveTo(-4,-152+i*12);c.lineTo(60,-140+i*12);
      c.lineTo(60,-128+i*12);c.lineTo(-4,-140+i*12);c.closePath();c.fill();}
    c.restore();}
  // neck — rises from the chest/shoulder, leans forward
  c.fillStyle=coat.a;c.beginPath();
  c.moveTo(20,-100);
  c.quadraticCurveTo(30,-122,44,-142);
  c.lineTo(66,-128);
  c.quadraticCurveTo(56,-102,48,-72);
  c.closePath();c.fill();c.stroke();
  // head — carried forward, nose dipped
  c.save();c.translate(56,-134);c.rotate(0.30);
  // far ear
  c.fillStyle=coat.b;c.beginPath();c.moveTo(-15,-9);c.lineTo(-12,-27);c.lineTo(-4,-11);c.closePath();c.fill();c.stroke();
  c.fillStyle=coat.a;c.beginPath();c.ellipse(0,0,19,14,0.05,0,TAU);c.fill();c.stroke();
  // muzzle
  c.fillStyle=coat.c;c.beginPath();c.roundRect(9,-10,28,20,10);c.fill();c.stroke();
  c.fillStyle='#432818';c.beginPath();c.arc(30,-2,2,0,TAU);c.fill();
  // mouth
  c.beginPath();c.moveTo(27,7);c.quadraticCurveTo(31,9,35,6);c.stroke();
  // near ear
  c.fillStyle=coat.a;c.beginPath();c.moveTo(-7,-11);c.lineTo(-1,-29);c.lineTo(6,-12);c.closePath();c.fill();c.stroke();
  // eye
  const blink=o.blink||rest;
  if(blink){c.beginPath();c.moveTo(-3,-4);c.quadraticCurveTo(1,-1,5,-4);c.stroke();}
  else{c.fillStyle='#2b1a0e';c.beginPath();c.ellipse(1,-4,3.6,4,0,0,TAU);c.fill();
    c.fillStyle='#fff';c.beginPath();c.arc(2.3,-5.6,1.3,0,TAU);c.fill();}
  // forelock
  c.fillStyle=(mane.pat==='rainbow')?RAINBOW[0]:mane.a;
  c.beginPath();c.ellipse(-9,-11,9.5,6,-0.4,0,TAU);c.fill();c.stroke();
  // hat sits on head (counter-rotated so it stays level)
  c.save();c.translate(-4,-20);c.rotate(-0.26);drawHat(c,hat,1);c.restore();
  c.restore();
  // saddle blanket (cosmetic) + saddle
  const bl=BLANKETS[o.blanket||SV.eq.blanket]||BLANKETS.crimson;
  c.fillStyle=bl.a;c.beginPath();c.roundRect(-28,-110,48,24,5);c.fill();c.stroke();
  if(bl.pat==='star'){c.fillStyle=bl.t;c.font='8px sans-serif';c.textAlign='center';c.textBaseline='middle';
    c.fillText('✦',-18,-100);c.fillText('✦',-5,-93);c.fillText('✦',8,-101);c.fillText('✦',15,-92);}
  c.fillStyle=bl.t;c.fillRect(-28,-90,48,4);
  c.fillStyle='#7A3020';c.beginPath();c.ellipse(-4,-110,17,7,0,Math.PI,0);c.fill();c.stroke();
  // saddlebag (near side, rear) — bulges with load
  const wl=(o.wl||0)+(o.wr||0);
  const bulge=clamp(wl*1.1,0,12);
  c.fillStyle='#8C5E3C';c.beginPath();c.roundRect(-52,-92,26,26+bulge,8);c.fill();c.stroke();
  c.fillStyle='#6E4425';c.beginPath();c.roundRect(-52,-92,26,10,{tl:8,tr:8,br:2,bl:2});c.fill();c.stroke();
  c.fillStyle='#FFD166';c.beginPath();c.arc(-39,-80,2.5,0,TAU);c.fill();c.stroke();
  // strap
  c.beginPath();c.moveTo(-24,-88);c.quadraticCurveTo(-20,-60,-14,-54);c.stroke();
  // sweat / zzz
  if(o.sweat){c.fillStyle='#4EA5D9';c.beginPath();
    const sy=-150+((idle*40)%26);
    c.ellipse(66,sy,3,4.4,0,0,TAU);c.fill();}
  c.restore();
}

/* ---------- PIP the toucan ---------- */
function drawToucan(c,x,y,s,o){
  o=o||{};
  const bk=BEAKS[o.beak||SV.eq.beak]||BEAKS.classic;
  const hat=o.hat!==undefined?o.hat:SV.eq.hat;
  const flap=o.flap!==undefined?o.flap:Math.sin((o.t||0)*11)*0.55;

  // tail
  c.save();c.translate(-13,12);c.rotate(-0.5+Math.sin((o.t||0)*3)*0.06);
  c.fillStyle='#20242C';c.beginPath();c.roundRect(-14,-4,16,9,4);c.fill();c.stroke();
  c.fillStyle='#D7263D';c.beginPath();c.roundRect(-13,3,10,5,2.5);c.fill();

    c.beginPath();c.moveTo(-2,17);c.lineTo(-1,25);c.moveTo(6,17);c.lineTo(5,25);c.stroke();
    c.strokeStyle='#101318';c.lineWidth=2.6;
  }else{
    c.strokeStyle='#5A7684';c.lineWidth=3.4;
    c.beginPath();c.moveTo(-1,18);c.lineTo(-2,24);c.moveTo(6,18);c.lineTo(6,24);c.stroke();
    c.strokeStyle='#101318';c.lineWidth=2.6;
  }
  // body
  c.fillStyle='#20242C';c.beginPath();c.ellipse(0,0,15.5,20,0.08,0,TAU);c.fill();c.stroke();
  // chest/face patch
  c.fillStyle='#FFF8E1';c.beginPath();c.ellipse(6.5,-3,10,13.5,0.12,0,TAU);c.fill();
  c.strokeStyle='rgba(16,19,24,0.35)';c.stroke();c.strokeStyle='#101318';
  // wing
  c.save();c.translate(-5,-1);c.rotate(flap*0.6-0.15);
  c.fillStyle='#171B22';c.beginPath();c.ellipse(0,7,7.5,13,0.18,0,TAU);c.fill();c.stroke();
  c.restore();
  // eye
  c.fillStyle='#59C3E3';c.beginPath();c.arc(8,-9,4.6,0,TAU);c.fill();c.stroke();
  c.fillStyle='#101318';c.beginPath();c.arc(9,-9,2.1,0,TAU);c.fill();
  c.fillStyle='#fff';c.beginPath();c.arc(9.8,-10,0.8,0,TAU);c.fill();
  // beak
  c.fillStyle=bk.a;c.beginPath();
  c.moveTo(13,-13);
  c.quadraticCurveTo(38,-15,45,-6);
  c.quadraticCurveTo(46,-3,43,-2);
  c.lineTo(14,-1);c.closePath();c.fill();c.stroke();
  // lower beak
  c.fillStyle=bk.a;c.beginPath();
  c.moveTo(14,-1);c.lineTo(40,-2);c.quadraticCurveTo(38,5,28,5);c.quadraticCurveTo(18,5,14,1);c.closePath();c.fill();c.stroke();
  // ridge + tip
  c.fillStyle=bk.b;c.beginPath();
  c.moveTo(14,-12.5);c.quadraticCurveTo(36,-14.5,43,-7);c.quadraticCurveTo(36,-11,15,-9.5);c.closePath();c.fill();
  c.fillStyle=bk.c;c.beginPath();c.ellipse(42.5,-4.5,3.6,4.2,0.3,0,TAU);c.fill();
  c.strokeStyle='rgba(16,19,24,0.5)';c.beginPath();c.moveTo(14,-1);c.lineTo(40,-2);c.stroke();c.strokeStyle='#101318';
  // tiny hat
  c.save();c.translate(1,-17);c.rotate(-0.05);drawHat(c,hat,0.55);c.restore();
  c.restore();
}

/* ---------- scene helpers ---------- */
function skyGrad(c,cols,y0,y1){const g=c.createLinearGradient(0,y0,0,y1);g.addColorStop(0,cols[0]);g.addColorStop(1,cols[1]);return g;}
function drawCloud(c,x,y,s,alpha){c.save();c.globalAlpha=alpha;c.fillStyle='#fff';
  c.beginPath();c.arc(x,y,14*s,0,TAU);c.arc(x+16*s,y-6*s,17*s,0,TAU);c.arc(x+34*s,y,13*s,0,TAU);
  c.arc(x+17*s,y+6*s,15*s,0,TAU);c.fill();c.restore();}
function hash(i){let h=(i*2654435761)%4294967296;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967296;}

function drawBunting(c,y,off){
  const cols=['#E4572E','#FFB627','#7DC95E','#4EA5D9','#CE8BE0'];
  c.strokeStyle='rgba(90,50,20,0.55)';c.lineWidth=2;
  c.beginPath();c.moveTo(-10,y);
  for(let x=-10;x<W+20;x+=26)c.quadraticCurveTo(x+13,y+7,x+26,y);
  c.stroke();
  let ci=0;
  for(let x=-10;x<W+14;x+=26){
    c.fillStyle=cols[(ci+off)%5];ci++;
    c.beginPath();c.moveTo(x+7,y+3);c.lineTo(x+19,y+3);c.lineTo(x+13,y+15);c.closePath();c.fill();
  }
}

/* ---------- market (pack) scene ---------- */
function drawPackScene(c){
  // warm sky
  c.fillStyle=skyGrad(c,['#FFD98E','#FFE9B8'],0,H*0.5);c.fillRect(0,0,W,H*0.55);
  // ground
  c.fillStyle='#E8C27C';c.fillRect(0,H*0.42,W,H*0.58);
  c.fillStyle='rgba(140,94,60,0.14)';
  for(let i=0;i<7;i++){const yy=H*0.5+i*(H*0.5/7);c.fillRect(0,yy,W,2);}
  drawCloud(c,W*0.16+Math.sin(G.t*0.1)*10,44,0.8,0.7);
  drawCloud(c,W*0.74+Math.sin(G.t*0.13+2)*12,66,0.6,0.6);
  // stalls behind belt
  const sy=L.beltY+L.beltH+8;
  function stall(x,w,col1,col2){
    c.fillStyle='#8C5E3C';c.fillRect(x+4,sy+16,6,42);c.fillRect(x+w-10,sy+16,6,42);
    c.fillStyle='#A9744B';c.beginPath();c.roundRect(x-2,sy+42,w+4,16,4);c.fill();
    for(let i=0;i<Math.ceil((w+8)/22);i++){
      const sx=x-4+i*22, sw=Math.min(22,(w+8)-i*22);
      c.fillStyle=i%2?col2:col1;
      c.fillRect(sx,sy,sw,16);
      c.beginPath();c.arc(sx+sw/2,sy+16,sw/2,0,Math.PI);c.fill();
    }
  }
  stall(W*0.06,W*0.34,'#E4572E','#FFF3D6');
  stall(W*0.58,W*0.34,'#4EA5D9','#FFF3D6');
  drawBunting(c,L.topH+8,0);
  // conveyor belt
  const by=L.beltY;
  c.fillStyle='#8C5E3C';c.beginPath();c.roundRect(-8,by,W+16,L.beltH,14);c.fill();
  c.fillStyle='#A9744B';c.beginPath();c.roundRect(-8,by+6,W+16,L.beltH-16,10);c.fill();
  // moving slats
  c.strokeStyle='rgba(90,50,20,0.35)';c.lineWidth=3;
  const so=((G.beltOff)%34+34)%34;
  for(let x=-so;x<W+34;x+=34){c.beginPath();c.moveTo(x,by+8);c.lineTo(x-8,by+L.beltH-12);c.stroke();}
  // belt items
  for(const it of G.belt)drawBeltItem(c,it);
  // rollers
  c.fillStyle='#6E4425';
  for(let x=14;x<W;x+=W/5){c.beginPath();c.arc(x,by+L.beltH+7,7,0,TAU);c.fill();}
}
function drawBeltItem(c,it){
  const d=ITEMS[it.id];
  const bobY=Math.sin(G.t*3+it.seed*9)*2;
  const cy=L.beltY+L.beltH/2+bobY-2;
  c.save();c.translate(it.x,cy);
  // crate
  c.fillStyle='#DFA45E';c.strokeStyle='#8C5E3C';c.lineWidth=3;
  c.beginPath();c.roundRect(-26,-26,52,52,10);c.fill();c.stroke();
  c.strokeStyle='rgba(140,94,60,0.5)';c.lineWidth=2;
  c.beginPath();c.moveTo(-26,-9);c.lineTo(26,-9);c.moveTo(-26,9);c.lineTo(26,9);c.stroke();
  // emoji
  c.font='30px sans-serif';c.textAlign='center';c.textBaseline='middle';
  c.fillText(d.e,0,-2);
  // footprint (grid cells this item occupies)
  c.fillStyle='#6E4425';
  const cs=5.5, ox=-(d.fw*(cs+2)-2)/2, oy=d.fh>1?10:15;
  for(let rr=0;rr<d.fh;rr++)for(let cc=0;cc<d.fw;cc++){
    c.beginPath();c.roundRect(ox+cc*(cs+2),oy+rr*(cs+2),cs,cs,1.5);c.fill();
  }
  // useful-on-route badge
  if(it.useful){
    c.fillStyle='#4EA5D9';c.strokeStyle='#1A759F';c.lineWidth=2.2;
    c.beginPath();c.arc(-20,-20,9,0,TAU);c.fill();c.stroke();
    c.fillStyle='#fff';c.font='700 12px Fredoka, sans-serif';c.fillText('✓',-20,-19);
    c.strokeStyle='#8C5E3C';
  }
  // order badge
  if(it.want){
    c.save();c.translate(20,-20);c.rotate(Math.sin(G.t*4+it.seed)*0.15);
    c.fillStyle='#FFD166';c.strokeStyle='#C4820A';c.lineWidth=2.4;
    c.beginPath();c.arc(0,0,10,0,TAU);c.fill();c.stroke();
    c.fillStyle='#7A4A21';c.font='700 12px Fredoka, sans-serif';c.fillText('!',0,1);
    c.restore();
  }
  if(it.id==='gem'&&Math.sin(G.t*5+it.seed*7)>0.55){
    c.fillStyle='#fff';c.font='13px sans-serif';c.fillText('✨',12,-14);
  }
  c.restore();
}
function bagDims(){return {cols:3+(SV.gear.bags>=1?1:0), rows:3+(SV.gear.bags>=2?1:0)};}
function bagW(bag){return bag.places.reduce((a,p)=>a+p.w*p.h,0);} // cells used
function bagGridOcc(bag){const {cols,rows}=bagDims();
  const g=Array.from({length:rows},()=>Array(cols).fill(-1));
  bag.places.forEach((p,i)=>{for(let r=0;r<p.h;r++)for(let c=0;c<p.w;c++)g[p.r+r][p.c+c]=i;});
  return g;}
function fitInto(bag,id){const it=ITEMS[id];const {cols,rows}=bagDims();const g=bagGridOcc(bag);
  const shapes=(it.fw===it.fh)?[[it.fw,it.fh]]:[[it.fw,it.fh],[it.fh,it.fw]];
  for(const [w,h] of shapes)
    for(let r=0;r<=rows-h;r++)for(let c=0;c<=cols-w;c++){
      let ok=true;
      for(let rr=0;rr<h&&ok;rr++)for(let cc=0;cc<w;cc++)if(g[r+rr][c+cc]>=0){ok=false;break;}
      if(ok)return {r,c,w,h};
    }
  return null;}
function drawBagPanel(c,r,bag,label,side){
  const {cols,rows}=bagDims();
  const fits=G.held?fitInto(bag,G.held):null;
  const hot=G.held&&fits, dead=G.held&&!fits;
  c.save();
  if(hot){c.shadowColor='#FFD166';c.shadowBlur=10+Math.sin(G.t*7)*6;}
  c.fillStyle='#FFF3D6';c.strokeStyle=hot?'#FFB627':dead?'#D9958A':'#C98B4B';c.lineWidth=hot?4:3;
  c.beginPath();c.roundRect(r.x,r.y,r.w,r.h,14);c.fill();c.stroke();
  c.shadowBlur=0;
  // header
  c.fillStyle='#7A4A21';c.font='700 12px Fredoka, sans-serif';c.textAlign=side<0?'left':'right';
  c.fillText(label,side<0?r.x+10:r.x+r.w-10,r.y+16);
  c.font='700 11px Fredoka, sans-serif';c.textAlign=side<0?'right':'left';
  c.fillStyle=dead?'#C1442E':'#a8703a';
  c.fillText(dead?'no room!':bagW(bag)+'/'+(cols*rows),side<0?r.x+r.w-10:r.x+10,r.y+16);
  // grid
  const cell=Math.min((r.w-16)/cols,(r.h-30)/rows);
  const gx=r.x+(r.w-cell*cols)/2, gy=r.y+22;
  c.strokeStyle='rgba(201,139,75,0.45)';c.lineWidth=1.5;
  for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++){
    c.fillStyle='rgba(255,255,255,0.55)';
    c.beginPath();c.roundRect(gx+cc*cell+1.5,gy+rr*cell+1.5,cell-3,cell-3,5);c.fill();c.stroke();
  }
  // items span their cells
  c.textAlign='center';c.textBaseline='middle';
  for(const p of bag.places){
    const px=gx+p.c*cell, py=gy+p.r*cell, pw=p.w*cell, ph=p.h*cell;
    c.fillStyle='#FFE9B8';c.strokeStyle='#C98B4B';c.lineWidth=2;
    c.beginPath();c.roundRect(px+2,py+2,pw-4,ph-4,7);c.fill();c.stroke();
    c.font=Math.min(pw,ph)*0.62+'px sans-serif';
    c.fillText(ITEMS[p.id].e,px+pw/2,py+ph/2+1);
  }
  c.restore();
}

/* ---------- journey scene ---------- */
function drawJourneyScene(c){
  const R=G.region, gy=L.groundY;
  c.fillStyle=skyGrad(c,R.sky,0,gy);c.fillRect(0,0,W,gy);
  // celestial
  if(R.prop==='bay'){
    c.fillStyle='#FFF3B0';c.beginPath();c.arc(W*0.78,70,22,0,TAU);c.fill();
    c.fillStyle=R.sky[0];c.beginPath();c.arc(W*0.78-9,64,19,0,TAU);c.fill();
    c.fillStyle='rgba(255,255,255,0.9)';
    for(let i=0;i<24;i++){const sx=(hash(i)*W),syy=hash(i+50)*gy*0.55;
      c.globalAlpha=0.4+Math.sin(G.t*2+i)*0.35;c.fillRect(sx,syy,2,2);}
    c.globalAlpha=1;
  }else{
    c.fillStyle='rgba(255,243,176,0.95)';c.beginPath();c.arc(W*0.82,64,24,0,TAU);c.fill();
  }
  drawCloud(c,((W*0.2-G.wx*0.12)%(W+160)+W+160)%(W+160)-80,54,0.75,0.8);
  drawCloud(c,((W*0.7-G.wx*0.09)%(W+160)+W+160)%(W+160)-80,96,0.55,0.65);
  // distant birds
  for(let i=0;i<3;i++){
    const bx=((i*167+40-G.wx*0.35)%(W+80)+W+80)%(W+80)-40, byy=52+hash(i+7)*88;
    const fl=Math.sin(G.t*6+i*2)*3;
    c.strokeStyle='rgba(70,55,40,0.5)';c.lineWidth=2;
    c.beginPath();c.moveTo(bx-6,byy+fl);c.quadraticCurveTo(bx,byy-3,bx,byy);
    c.quadraticCurveTo(bx,byy-3,bx+6,byy+fl);c.stroke();
  }
  // far layer
  drawFar(c,R,gy);
  // mid props
  drawMid(c,R,gy);
  // ground
  c.fillStyle=R.ground;c.fillRect(0,gy,W,H-gy);
  c.fillStyle='rgba(0,0,0,0.10)';c.fillRect(0,gy,W,5);
  // road
  c.fillStyle='rgba(120,90,55,0.5)';c.fillRect(0,gy+16,W,26);
  c.strokeStyle='rgba(255,248,231,0.5)';c.lineWidth=3;c.setLineDash([18,16]);
  c.lineDashOffset=G.wx%34;
  c.beginPath();c.moveTo(0,gy+29);c.lineTo(W,gy+29);c.stroke();c.setLineDash([]);
  // ground tufts
  for(let i=0;i<9;i++){
    const spacing=W/6;
    const xr=((i*spacing-G.wx)%(W+spacing)+W+spacing)%(W+spacing)-spacing/2;
    const yr=gy+52+hash(i)*(H-gy-70);
    c.fillStyle='rgba(255,255,255,0.10)';
    c.beginPath();c.ellipse(xr,yr,9+hash(i+9)*7,2.6,0,0,TAU);c.fill();
  }
  // landmarks
  for(const nd of G.nodes)drawLandmark(c,nd,gy);
}
function drawWeather(c){
  if(!(G.weather&&(G.state==='journey')))return;
  const id=G.weather.id, a=clamp(G.weather.t,0,1);
  c.save();c.globalAlpha=a;
  if(id==='rain'||id==='river'){
    c.strokeStyle='rgba(80,120,200,0.55)';c.lineWidth=2;
    for(let i=0;i<34;i++){
      const rx=(hash(i)*W+G.t*260)%W, ry=((hash(i+40)*H)+G.t*430)%H;
      c.beginPath();c.moveTo(rx,ry);c.lineTo(rx-4,ry+14);c.stroke();}
  }else if(id==='cold'){
    c.fillStyle='rgba(255,255,255,0.85)';
    for(let i=0;i<26;i++){
      const sx=(hash(i)*W+Math.sin(G.t*1.5+i)*30+G.t*30)%W, sy=(hash(i+60)*H+G.t*62)%H;
      c.beginPath();c.arc(sx,sy,2.2+hash(i+9)*2,0,TAU);c.fill();}
  }else if(id==='dark'){
    const g=c.createRadialGradient(L.jHorse.x,L.jHorse.y-80,90,L.jHorse.x,L.jHorse.y-80,Math.max(W,H)*0.75);
    g.addColorStop(0,'rgba(10,10,30,0)');g.addColorStop(1,'rgba(10,10,30,0.72)');
    c.fillStyle=g;c.fillRect(0,0,W,H);
  }else if(id==='bees'){
    c.font='15px sans-serif';c.textAlign='center';
    for(let i=0;i<7;i++){
      const bx=L.jHorse.x+150+Math.sin(G.t*3+i*2.2)*60+i*8, by=L.jHorse.y-140+Math.cos(G.t*4+i*1.7)*40;
      c.fillText('🐝',bx,by);}
  }
  c.restore();
}
function spawnTrail(x,y){
  const tr=SV.eq.trail;if(!tr||tr==='none')return;
  G.trailT=(G.trailT||0)-1;if(G.trailT>0)return;G.trailT=2;
  if(tr==='sparkle')G.parts.push({tp:'spark',x:x+rand(-4,4),y:y+rand(-4,4),vx:rand(-14,14),vy:rand(-6,20),life:0.5,max:0.5,color:choice(['#FFD166','#FFF3B0','#fff'])});
  else if(tr==='hearts')G.parts.push({tp:'txt',x,y,vx:rand(-10,10),vy:rand(6,22),life:0.6,max:0.6,txt:'💗',size:11});
  else if(tr==='rainbow')G.parts.push({tp:'poof',x,y,vx:rand(-8,8),vy:rand(4,16),life:0.55,max:0.55,r:4,color:choice(RAINBOW)});
}
function drawFar(c,R,gy){
  const off=G.wx*0.25, sp=190;
  c.fillStyle=R.far;
  for(let i=Math.floor(off/sp)-1;i<Math.floor((off+W)/sp)+2;i++){
    const x=i*sp-off, h1=44+hash(i)*70;
    if(R.prop==='pass'){
      c.fillStyle=R.far;
      c.beginPath();c.moveTo(x-80,gy);c.lineTo(x+15,gy-h1-46);c.lineTo(x+110,gy);c.closePath();c.fill();
      c.fillStyle='#fff';
      c.beginPath();c.moveTo(x-8,gy-h1-24);c.lineTo(x+15,gy-h1-46);c.lineTo(x+38,gy-h1-24);
      c.lineTo(x+28,gy-h1-18);c.lineTo(x+15,gy-h1-27);c.lineTo(x+2,gy-h1-17);c.closePath();c.fill();
    }else if(R.prop==='bay'){
      c.fillStyle=R.mid;c.fillRect(0,gy-34,W,34);
      c.fillStyle='rgba(255,255,255,0.25)';
      const wv=Math.sin(G.t*2+i)*3;
      c.fillRect(x-off%1,gy-20+wv,60,2.5);
      break;
    }else{
      c.fillStyle=R.far;
      c.beginPath();c.ellipse(x,gy+22,120,64+h1*0.5,0,Math.PI,0);c.fill();
    }
  }
  if(R.prop==='bay'){
    const bx=((W*0.6-G.wx*0.25)%(W+200)+W+200)%(W+200)-100;
    c.fillStyle='#FFF8E1';c.beginPath();c.moveTo(bx,gy-38);c.lineTo(bx,gy-64);c.lineTo(bx+20,gy-40);c.closePath();c.fill();
    c.fillStyle='#8C5E3C';c.fillRect(bx-12,gy-38,32,7);
  }
}
function drawMid(c,R,gy){
  const off=G.wx*0.55, sp=240;
  for(let i=Math.floor(off/sp)-1;i<Math.floor((off+W)/sp)+2;i++){
    const x=i*sp-off+hash(i+30)*90, r=hash(i+3);
    if(R.prop==='meadow'){
      c.fillStyle=R.mid;
      c.beginPath();c.arc(x,gy-8,20+r*12,0,TAU);c.arc(x+22,gy-4,16+r*8,0,TAU);c.fill();
      c.fillStyle='#F4A9C7';c.beginPath();c.arc(x+8,gy-22-r*8,3,0,TAU);c.fill();
    }else if(R.prop==='woods'){
      const th=66+r*46;
      c.fillStyle='#5C3A21';c.fillRect(x-5,gy-16,10,16);
      c.fillStyle=R.mid;
      c.beginPath();c.moveTo(x-30,gy-10);c.lineTo(x,gy-th);c.lineTo(x+30,gy-10);c.closePath();c.fill();
      c.beginPath();c.moveTo(x-22,gy-th*0.55);c.lineTo(x,gy-th-18);c.lineTo(x+22,gy-th*0.55);c.closePath();c.fill();
    }else if(R.prop==='pass'){
      c.fillStyle=R.mid;
      c.beginPath();c.moveTo(x-26,gy);c.lineTo(x-6,gy-34-r*22);c.lineTo(x+22,gy);c.closePath();c.fill();
    }else if(R.prop==='festival'){
      const tc=['#E4572E','#4EA5D9','#CE8BE0','#FFB627'][i&3];
      c.fillStyle=tc;
      c.beginPath();c.moveTo(x-30,gy);c.lineTo(x,gy-52-r*18);c.lineTo(x+30,gy);c.closePath();c.fill();
      c.fillStyle='rgba(255,255,255,0.75)';
      c.beginPath();c.moveTo(x-12,gy);c.lineTo(x,gy-24);c.lineTo(x+12,gy);c.closePath();c.fill();
      c.fillStyle='#FFD166';c.beginPath();c.arc(x,gy-56-r*18,4,0,TAU);c.fill();
    }else if(R.prop==='bay'){
      c.fillStyle=R.mid;
      c.beginPath();c.arc(x,gy,16+r*10,Math.PI,0);c.fill();
      c.fillStyle='#7FD8C9';c.beginPath();c.arc(x+8,gy-10-r*8,3,0,TAU);c.fill();
    }
  }
}
function drawLandmark(c,nd,gy){
  const x=nd.x-G.wx+L.jHorse.x;
  if(x<-90||x>W+90)return;
  c.save();c.translate(x,gy+14);
  if(nd.type==='arrive'){
    // destination gate
    c.fillStyle='#8C5E3C';c.strokeStyle='#5C3A21';c.lineWidth=3;
    c.beginPath();c.roundRect(-58,-128,12,128,4);c.fill();c.stroke();
    c.beginPath();c.roundRect(46,-128,12,128,4);c.fill();c.stroke();
    c.fillStyle='#FFF3D6';c.beginPath();c.roundRect(-66,-152,132,36,10);c.fill();c.stroke();
    c.font='22px sans-serif';c.textAlign='center';c.textBaseline='middle';
    c.fillText(G.region.icon,0,-134);
    const cols=['#E4572E','#FFB627','#7DC95E','#4EA5D9'];
    for(let i=0;i<4;i++){c.fillStyle=cols[i];
      c.beginPath();c.moveTo(-46+i*26,-116);c.lineTo(-30+i*26,-116);c.lineTo(-38+i*26,-102);c.closePath();c.fill();}
  }else if(nd.type==='fork'){
    // signpost
    c.fillStyle='#8C5E3C';c.strokeStyle='#5C3A21';c.lineWidth=3;
    c.beginPath();c.roundRect(-5,-74,10,74,3);c.fill();c.stroke();
    c.fillStyle='#FFF3D6';c.beginPath();c.roundRect(-34,-102,68,34,8);c.fill();c.stroke();
    c.font='21px sans-serif';c.textAlign='center';c.textBaseline='middle';
    c.fillText(nd.done?'✅':'🔀',0,-85);
  }else if(!nd.done&&nd.ev){
    // the encounter itself stands on the road ahead
    const ev=EVENTS[nd.ev];
    const floaty=['rain','cold','dark','rainbow','bees'].includes(nd.ev);
    const bob=Math.sin(G.t*3+nd.x)*(floaty?6:3);
    c.translate(0,22); // road level
    if(!floaty){c.fillStyle='rgba(0,0,0,0.18)';c.beginPath();c.ellipse(0,2,20,5,0,0,TAU);c.fill();}
    c.font='38px sans-serif';c.textAlign='center';c.textBaseline='alphabetic';
    c.fillText(ev.icon,0,(floaty?-52:-6)+bob);
    if(Math.abs(x-L.jHorse.x)<W*0.7){
      c.font='15px sans-serif';c.globalAlpha=0.55+Math.sin(G.t*5)*0.35;
      c.fillText('❗',15,(floaty?-96:-46)+bob);c.globalAlpha=1;
    }
  }
  c.restore();
}

/* ---------- title / shop scenes ---------- */
function drawMeadowIdle(c,horseX,horseY,horseS){
  c.fillStyle=skyGrad(c,['#8ED6FF','#EAF9E0'],0,H*0.6);c.fillRect(0,0,W,H*0.6);
  c.fillStyle='rgba(255,243,176,0.95)';c.beginPath();c.arc(W*0.82,70,26,0,TAU);c.fill();
  drawCloud(c,W*0.18+Math.sin(G.t*0.12)*12,70,0.9,0.85);
  drawCloud(c,W*0.62+Math.sin(G.t*0.09+3)*14,120,0.65,0.7);
  c.fillStyle='#A8D971';c.beginPath();c.ellipse(W*0.25,H*0.62,W*0.5,90,0,Math.PI,0);c.fill();
  c.fillStyle='#96CD60';c.beginPath();c.ellipse(W*0.85,H*0.62,W*0.45,70,0,Math.PI,0);c.fill();
  c.fillStyle='#8CC152';c.fillRect(0,H*0.6,W,H*0.4);
  for(let i=0;i<12;i++){
    const fx=hash(i+70)*W, fy=H*0.64+hash(i+90)*(H*0.3);
    c.fillStyle=['#F4A9C7','#FFF3B0','#fff'][i%3];
    c.beginPath();c.arc(fx,fy,3.2,0,TAU);c.fill();
  }
  // biscuit idle
  drawHorse(c,horseX,horseY,horseS,{idleT:G.idleT,blink:G.blinkT<0.13,wl:0,wr:0});
  // pip circles overhead
  const px=horseX+Math.sin(G.t*0.9)*W*0.24;
  const py=horseY-228*horseS+Math.sin(G.t*1.7)*14;
  drawToucan(c,px,py,0.95,{t:G.t,face:Math.cos(G.t*0.9)>0?1:-1});
}

/* ---------- render dispatch ---------- */
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(G.shake>0){ctx.translate(rand(-1,1)*G.shake*6,rand(-1,1)*G.shake*5);}
  if(G.state==='title'){
    drawMeadowIdle(ctx,W*0.5,H*0.66,clamp(W/430,0.6,1)*1.05);
  }else if(G.state==='debugH'){
    ctx.fillStyle='#EAF9E0';ctx.fillRect(0,0,W,H);
    drawHorse(ctx,W*0.5,H*0.40,1.9,{idleT:G.idleT,blink:G.blinkT<0.13});
    drawHorse(ctx,W*0.5,H*0.78,1.5,{phase:G.t*8,moving:1,wl:4,wr:3});
  }else if(G.state==='shop'){
    ctx.fillStyle=skyGrad(ctx,['#8ED6FF','#EAF9E0'],0,H*0.36);ctx.fillRect(0,0,W,H*0.36);
    ctx.fillStyle='#8CC152';ctx.fillRect(0,H*0.28,W,H*0.14);
    drawHorse(ctx,W*0.42,H*0.315,0.72,{idleT:G.idleT,blink:G.blinkT<0.13});
    drawToucan(ctx,W*0.74,H*0.17+Math.sin(G.t*1.6)*7,1.0,{t:G.t,face:-1});
  }else if(G.state==='pack'){
    drawPackScene(ctx);
    const hp=L.packHorse;
    const wl=bagW(G.bagL),wr=bagW(G.bagR);
    G.tilt=lerp(G.tilt,clamp((wr-wl)*0.014,-0.09,0.09),0.1);
    drawHorse(ctx,hp.x,hp.y,hp.s,{idleT:G.idleT,blink:G.blinkT<0.13,tilt:G.tilt,wl,wr,
      sweat:G.pat<12&&G.pat>0});
    drawBagPanel(ctx,L.panL,G.bagL,'◀ LEFT BAG',-1);
    drawBagPanel(ctx,L.panR,G.bagR,'RIGHT BAG ▶',1);
    // toucan on top
    const t=G.tou;
    drawToucan(ctx,t.x,t.y,1.05,{t:G.t,face:t.face,carry:G.held,rot:t.rot||0});
    // toss-back X while carrying
    if(G.held&&t.mode==='carryHover'){
      ctx.save();ctx.translate(t.x-(t.face||1)*48,t.y+4);
      ctx.fillStyle='rgba(228,87,46,0.95)';ctx.beginPath();ctx.arc(0,0,13,0,TAU);ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();
      ctx.moveTo(-4.5,-4.5);ctx.lineTo(4.5,4.5);ctx.moveTo(4.5,-4.5);ctx.lineTo(-4.5,4.5);ctx.stroke();
      ctx.restore();
    }
  }else if(G.state==='journey'||G.state==='results'){
    drawJourneyScene(ctx);
    const jh=L.jHorse;
    const moving=G.jstate==='trot';
    drawHorse(ctx,jh.x,jh.y,jh.s,{phase:G.horsePhase,moving,idleT:G.idleT,blink:G.blinkT<0.13,
      wl:bagW(G.bagL),wr:bagW(G.bagR),resting:G.jstate==='rest'});
    const tx=jh.x+92*jh.s+Math.sin(G.t*1.3)*8;
    const ty=jh.y-224*jh.s+Math.sin(G.t*2.2)*10;
    drawToucan(ctx,tx,ty,1.0,{t:G.t,face:1});
    drawWeather(ctx);
  }
  drawParts(ctx);
  ctx.restore();
}

/* ---------- main loop ---------- */
let lastTs=0;
function frame(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05)||0.016;lastTs=ts;
  G.t+=dt;G.idleT+=dt;
  G.blinkT-=dt;if(G.blinkT<0)G.blinkT=rand(1.6,4.2);
  if(G.shake>0)G.shake=Math.max(0,G.shake-dt*3);
  if(G.state==='pack')updatePack(dt);
  else if(G.state==='journey')updateJourney(dt);
  updateTou(dt);
  updateParts(dt);
  render();
  requestAnimationFrame(frame);
}
</script>
<script>
'use strict';
/* ============================================================
   GAME LOGIC — packing, journey, encounters, shop, boot
   ============================================================ */
const elTopbar=$('topbar'),elTbTop=$('tbTop'),elTbSub=$('tbSub'),elPatwrap=$('patwrap'),elPatbar=$('patbar');
const elDepart=$('departBtn'),elCard=$('card'),elToast=$('toast'),elHint=$('hint');
let toastTimer=null,shopReturn='title',shopTab='coat';

function showToast(msg,ms){elToast.textContent=msg;elToast.classList.add('on');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>elToast.classList.remove('on'),ms||1800);}
function vibe(ms){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
function coinPing(){Sound.coin(1);}

/* ---------- inventory helpers ---------- */
function countItem(id){return G.bagL.places.filter(p=>p.id===id).length+G.bagR.places.filter(p=>p.id===id).length;}
function totalItems(){return G.bagL.places.length+G.bagR.places.length;}
function removeItem(id){
  const l=bagW(G.bagL)>=bagW(G.bagR)?[G.bagL,G.bagR]:[G.bagR,G.bagL];
  for(const bag of l){const ix=bag.places.findIndex(p=>p.id===id);if(ix>=0){bag.places.splice(ix,1);return true;}}
  return false;}
function heaviestItem(){let best=null,bw=-1;
  for(const bag of[G.bagL,G.bagR])for(const p of bag.places)if(ITEMS[p.id].w>bw&&p.id!=='gem'){bw=ITEMS[p.id].w;best=p.id;}
  return best;}
function eachPacked(fn){for(const bag of[G.bagL,G.bagR])for(const p of bag.places)fn(p.id);}
function riskP(){return clamp(0.55+(SV.gear.shoe?0.12:0)+G.mood*0.06-Math.min(G.tier*0.03,0.09),0.2,0.95);}
function moodShift(d){
  const old=G.mood;G.mood=clamp(G.mood+d,-2,2);
  if(G.mood!==old){
    pText(L.jHorse.x,L.jHorse.y-206*L.jHorse.s,MOODS[G.mood+2],null,24);
    updateTopbar();
  }
}

/* ---------- day building ---------- */
function buildDay(){
  const day=G.day;
  G.region=REGIONS[(day-1)%REGIONS.length];
  G.tier=Math.floor((day-1)/REGIONS.length);
  G.patMax=50+SV.gear.saddle*10-Math.min(G.tier*3,12);
  G.pat=G.patMax;
  // order
  const oSize=day===1?1:Math.min(3,2+(G.tier>=1?1:0));
  G.order=[];
  const opool=G.region.orders.filter(id=>id!=='gem'||G.tier>=1);
  for(let i=0;i<oSize;i++)G.order.push(choice(opool));
  // events
  const evCount=Math.min(4+(G.tier>=1?1:0),5);
  let pool=shuffled(G.region.pool);
  const allIds=Object.keys(EVENTS).filter(k=>k!=='chest');
  while(pool.length<evCount+2)pool.push(choice(allIds.filter(k=>!pool.includes(k))));
  const main=pool.slice(0,evCount);
  const rest=pool.slice(evCount).concat(shuffled(allIds.filter(k=>!pool.includes(k))));
  G.forkA=rest[0]||'chest'; G.forkB=rest[1]||'chest';
  // node layout: 2 events, fork, fork-event, remaining events, arrive
  G.nodes=[];let d=360;const sp=430;
  G.nodes.push({type:'ev',ev:main[0],x:d});d+=sp;
  G.nodes.push({type:'ev',ev:main[1],x:d});d+=sp;
  G.nodes.push({type:'fork',x:d});d+=sp*0.8;
  G.nodes.push({type:'ev',ev:null,x:d});d+=sp; // set by fork
  for(let i=2;i<main.length;i++){G.nodes.push({type:'ev',ev:main[i],x:d});d+=sp;}
  if(Math.random()<0.22){G.nodes.push({type:'ev',ev:'chest',x:d-sp/2});}
  G.nodes.push({type:'arrive',x:d+140});
  G.routeIcons=main.map(id=>EVENTS[id].icon);
  G.routeEvs=main;
  G.revealN=2+(SV.gear.spy?1:0);
  // items that solve the *revealed* route events get a blue badge on the belt
  G.routeSet=new Set();
  main.slice(0,G.revealN).forEach(id=>{const ev=EVENTS[id];
    if(ev.opts)for(const o of ev.opts)if(o.item)G.routeSet.add(o.item);});
  // reset day state
  G.bagL={places:[]};G.bagR={places:[]};
  G.hearts=3;G.dayCoins=0;G.eventCoins=0;G.rescued=false;
  G.mood=SV.gear.charm?1:0;G.burst=0;G.weather=null;
  G.belt=[];G.beltTimer=0;G.held=null;G.spill=false;G.nodeIdx=0;G.wx=0;
  if(SV.gear.pouch){const f=fitInto(G.bagL,'apple');if(f)G.bagL.places.push(Object.assign({id:'apple'},f));}
  buildBeltPool();
}
function buildBeltPool(){
  const boost={};
  for(const id of G.order)boost[id]=(boost[id]||0)+2.4;
  for(const nd of G.nodes){if(nd.type!=='ev'||!nd.ev)continue;const ev=EVENTS[nd.ev];
    if(ev.opts)for(const o of ev.opts)if(o.item)boost[o.item]=(boost[o.item]||0)+1.2;}
  for(const o of [G.forkA,G.forkB]){const ev=EVENTS[o];if(ev&&ev.opts)for(const op of ev.opts)if(op.item)boost[op.item]=(boost[op.item]||0)+0.5;}
  G.beltPool=[];let acc=0;
  for(const id in ITEMS){
    let w=(RARE_WEIGHTS[id]!==undefined?RARE_WEIGHTS[id]:1)+(boost[id]||0);
    acc+=w;G.beltPool.push([id,acc]);
  }
  G.beltAcc=acc;
}
function pickBeltItem(){
  const r=Math.random()*G.beltAcc;
  for(const[id,a]of G.beltPool)if(r<=a)return id;
  return 'apple';
}

function showTutStep(){
  const steps=[

});
function tutAdvance(from){

}

function updatePack(dt){
  // belt
  const speed=46+Math.min(G.day*2,22);
  G.beltOff+=speed*dt;
  G.beltTimer-=dt;
  if(G.beltTimer<=0&&G.belt.length<7){
    G.beltTimer=rand(1.25,1.9);
    G.belt.push({id:pickBeltItem(),x:W+44,seed:Math.random()*10});
  }
  for(let i=G.belt.length-1;i>=0;i--){
    const it=G.belt[i];it.x-=speed*dt;
    if(it.x<-46)G.belt.splice(i,1);
  }
  // flag wanted items
  const packed={};eachPacked(id=>packed[id]=(packed[id]||0)+1);
  const need={};for(const id of G.order)need[id]=(need[id]||0)+1;
  for(const it of G.belt){
    it.want=!!(need[it.id]&&(packed[it.id]||0)<need[it.id]);
    it.useful=G.routeSet.has(it.id);
  }
  // patience
  if(!G.patPaused){
    G.pat-=dt;
    elPatbar.style.width=clamp(G.pat/G.patMax*100,0,100)+'%';
    if(G.pat<=12)elPatbar.style.background='linear-gradient(90deg,#E4572E,#F58549)';
    else elPatbar.style.background='linear-gradient(90deg,#7DC95E,#B5E655)';
    if(G.pat<=0){showToast('Biscuit’s patience ran out — off we go! 🐴');depart(true);}
  }
}

/* ---------- toucan FSM ---------- */
function touGoto(mode,tx,ty,dur,cb){const t=G.tou;
  t.mode=mode;t.fx=t.x;t.fy=t.y;t.tx=tx;t.ty=ty;t.p=0;t.dur=dur;t.cb=cb;
  t.face=tx>=t.x?1:-1;}
function updateTou(dt){
  const t=G.tou;t.bob+=dt;
  if(G.state!=='pack'){return;}
  if(t.mode==='hover'){
    t.x=lerp(t.x,L.homeTou.x+Math.sin(t.bob*1.4)*W*0.16,0.05);
    t.y=lerp(t.y,L.homeTou.y+Math.sin(t.bob*2.6)*7,0.08);
    t.face=Math.cos(t.bob*1.4)>=0?1:-1;t.rot=0;
  }else if(t.mode==='carryHover'){
    t.x=lerp(t.x,L.carryTou.x,0.12);
    t.y=lerp(t.y,L.carryTou.y+Math.sin(t.bob*3)*5,0.12);t.rot=0;
  }else{
    t.p=Math.min(1,t.p+dt/t.dur);
    const e=t.p<0.5?2*t.p*t.p:1-Math.pow(-2*t.p+2,2)/2;
    // live-track moving target for dives
    if(t.mode==='toItem'&&t.target){t.tx=t.target.x;t.ty=L.beltY+L.beltH/2-6;}
    t.x=lerp(t.fx,t.tx,e);t.y=lerp(t.fy,t.ty,e);
    t.rot=(t.mode==='toItem')?(t.face*0.35*Math.sin(t.p*Math.PI)):0;
    spawnTrail(t.x-10,t.y+8);
    if(t.p>=1){const cb=t.cb;t.cb=null;if(cb)cb();}
  }
}
function grabItem(it){
  const t=G.tou;t.target=it;
  touGoto('toItem',it.x,L.beltY+L.beltH/2-6,0.38,()=>{
    const ix=G.belt.indexOf(it);
    if(ix<0){touGoto('return',L.homeTou.x,L.homeTou.y,0.3,()=>{G.tou.mode='hover';});return;}
    G.belt.splice(ix,1);
    G.held=it.id;Sound.pop();vibe(12);pSpark(t.x,t.y,5);
    touGoto('carryHover2',L.carryTou.x,L.carryTou.y,0.32,()=>{G.tou.mode='carryHover';});
    tutAdvance('grab');
  });
}
function stowTo(side){
  const id=G.held;
  const bag=side<0?G.bagL:G.bagR, r=side<0?L.panL:L.panR;
  const fit=fitInto(bag,id);
  if(!fit){Sound.err();showToast('No room in the '+(side<0?'left':'right')+' bag for '+ITEMS[id].e+'!');G.shake=0.4;return;}
  touGoto('toBag',r.x+r.w/2,r.y-16,0.3,()=>{
    bag.places.push(Object.assign({id},fit));G.held=null;Sound.stow();vibe(8);
    pPoof(r.x+r.w/2,r.y+18,'rgba(255,220,150,0.8)');
    refreshOrder();updateDepartBtn();tutAdvance('stow');
    touGoto('return',L.homeTou.x,L.homeTou.y,0.35,()=>{G.tou.mode='hover';});
  });
}
function feedHorse(){
  const id=G.held,d=ITEMS[id];
  const hp=L.packHorse;
  touGoto('toMouth',hp.x+80*hp.s,hp.y-152*hp.s,0.35,()=>{
    G.held=null;Sound.munch();vibe(12);
    G.pat=Math.min(G.patMax,G.pat+d.food);
    pText(hp.x+70*hp.s,hp.y-160*hp.s,'+'+d.food+'s ⏳','#4F9A3A',18);
    pHeart(hp.x+40*hp.s,hp.y-150*hp.s,2);
    touGoto('return',L.homeTou.x,L.homeTou.y,0.35,()=>{G.tou.mode='hover';});
  });
}
function tossHeld(){
  Sound.whoosh();pPoof(G.tou.x,G.tou.y+30);
  G.held=null;
  touGoto('return',L.homeTou.x,L.homeTou.y,0.3,()=>{G.tou.mode='hover';});
}

/* ---------- tap routing ---------- */
function handleTap(x,y){
  if(G.state==='journey'){
    if(G.jstate==='trot'){G.burst=1;Sound.whoosh();vibe(8);
      for(let i=0;i<3;i++)pDust(L.jHorse.x-24+i*20,L.jHorse.y-4);}
    return;
  }
  if(G.state!=='pack')return;
  const t=G.tou;
  if(G.tutStep===0)return; // waiting for hint tap
  if(t.mode==='carryHover'&&G.held){
    // toss X
    if(Math.hypot(x-(t.x-(t.face||1)*48),y-(t.y+4))<22){tossHeld();return;}
    // bags
    if(x>=L.panL.x&&x<=L.panL.x+L.panL.w&&y>=L.panL.y-24){stowTo(-1);return;}
    if(x>=L.panR.x&&x<=L.panR.x+L.panR.w&&y>=L.panR.y-24){stowTo(1);return;}
    // feed
    const hp=L.packHorse,d=ITEMS[G.held];
    if(d.food&&Math.hypot(x-(hp.x+58*hp.s),y-(hp.y-132*hp.s))<52*hp.s+16){feedHorse();return;}
    return;
  }
  if(t.mode==='hover'){
    // nearest belt item
    let best=null,bd=44;
    for(const it of G.belt){
      const d=Math.hypot(x-it.x,y-(L.beltY+L.beltH/2));
      if(d<bd){bd=d;best=it;}
    }
    if(best){grabItem(best);return;}
    // tapping horse with no item: little whinny of impatience
    const hp=L.packHorse;
    if(Math.hypot(x-hp.x,y-(hp.y-90*hp.s))<80*hp.s){
      Sound.clip();pText(hp.x,hp.y-180*hp.s,'🐴?','#7A4A21',18);
    }
  }
}
cv.addEventListener('pointerdown',e=>{
  Sound.ensure();
  const r=cv.getBoundingClientRect();
  handleTap(e.clientX-r.left,e.clientY-r.top);
});

/* ---------- depart & journey ---------- */
function depart(auto){
  if(G.state!=='pack')return;
  if(totalItems()===0&&!auto){Sound.err();showToast('Pack something first — the client is waiting!');G.shake=0.4;return;}
  if(G.held)tossHeld();
  G.spill=Math.abs(bagW(G.bagL)-bagW(G.bagR))>=4;
  G.spillDone=false;
  G.state='journey';G.jstate='trot';G.wx=0;G.nodeIdx=0;G.stepT=0;
  Sound.whoosh();Sound.fanfare();
  hideAll();updateTopbar();updateDepartBtn();
  showToast(G.spill?'The bags are lopsided… hold on tight! ⚠️':'Off we go! 🐴🪶');
}
elDepart.addEventListener('click',()=>{Sound.click();depart(false);});
function goHome(){Sound.click();G.state='title';hideAll();updateTopbar();updateDepartBtn();updateTitleUI();$('title').classList.remove('hide');}

function updateJourney(dt){
  if(G.weather&&G.jstate==='trot'){G.weather.t-=dt;if(G.weather.t<=0)G.weather=null;}
  if(G.jstate==='trot'){
    G.burst=Math.max(0,G.burst-dt*0.7);
    const spd=205*(1+0.85*G.burst);
    G.wx+=spd*dt;G.horsePhase+=dt*(8.5+G.burst*5);
    const jh=L.jHorse;
    spawnTrail(jh.x+92*jh.s+Math.sin(G.t*1.3)*8, jh.y-216*jh.s);
    G.stepT-=dt;
    if(G.stepT<=0){G.stepT=0.31/(1+G.burst*0.7);G.stepAlt=!G.stepAlt;Sound.clip(G.stepAlt);
      pDust(L.jHorse.x-30*L.jHorse.s,L.jHorse.y-4);
      if(G.burst>0.3)pDust(L.jHorse.x+30*L.jHorse.s,L.jHorse.y-4);}
    // spill halfway to first node
    if(G.spill&&!G.spillDone&&G.wx>G.nodes[0].x*0.55){
      G.spillDone=true;
      const heavy=bagW(G.bagL)>=bagW(G.bagR)?G.bagL:G.bagR;
      if(heavy.places.length){
        let pi=0;heavy.places.forEach((p,i)=>{if(p.w*p.h>heavy.places[pi].w*heavy.places[pi].h)pi=i;});
        const id=heavy.places[pi].id;
        heavy.places.splice(pi,1);
        Sound.err();G.shake=0.6;vibe(30);
        pText(L.jHorse.x,L.jHorse.y-190*L.jHorse.s,ITEMS[id].e+' fell off!','#E4572E',19);
        pPoof(L.jHorse.x-40,L.jHorse.y-60);
        showToast('The lopsided bags lurched — '+ITEMS[id].n+' tumbled away! ⚖️');
      }
    }
    const nd=G.nodes[G.nodeIdx];
    if(nd&&G.wx>=nd.x){
      if(nd.type==='arrive'){arrive();}
      else if(nd.done){G.nodeIdx++;}
      else{G.jstate='card';openNode(nd);}
    }
  }else if(G.jstate==='celebrate'){
    G.celT-=dt;G.horsePhase+=dt*4;
    if(G.celT<=0)showResults();
  }
}
function openNode(nd){
  if(nd.type==='fork')showForkCard(nd);
  else showEventCard(nd);
}
function resumeTrot(nd){
  nd.done=true;G.nodeIdx++;G.jstate='trot';
  elCard.classList.add('hide');
  updateTopbar();
  if(G.hearts<=0&&!G.rescued){
    G.rescued=true;
    for(const n of G.nodes)if(n.type!=='arrive')n.done=true;
    showToast('A kind farmer’s cart carries you the rest of the way! 🛒');
  }
}

/* ---------- encounter cards ---------- */
function optBtn(inner,cls){return '<button class="opt '+(cls||'')+'">'+inner+'</button>';}
function showEventCard(nd){
  const ev=EVENTS[nd.ev];
  let html='<div class="cicon">'+ev.icon+'</div><h2>'+ev.title+'</h2><div class="cdesc">'+ev.desc+'</div>';
  const acts=[];
  if(ev.special==='trade'){
    const hv=heaviestItem();
    if(hv){html+=optBtn('<span class="oe">💎</span><span class="ol">Trade your '+ITEMS[hv].n+' '+ITEMS[hv].e+' for a gem<small>gems sell for 25🪙</small></span><span class="on">swap</span>');
      acts.push(()=>{removeItem(hv);addToBags('gem',true);Sound.spark();
        outcome(ev,'Deal! The trader vanishes in a puff of paperwork.','💎 +1',false);});}
    html+=optBtn('<span class="oe">👋</span><span class="ol">Politely decline</span><span class="on">—</span>');
    acts.push(()=>outcome(ev,'The trader nods respectfully and rolls away.','',false));
  }else if(ev.special==='chest'){
    const gift=choice(['apple','bread','cheese','scarf','rope','hat','gem']);
    const room=!!(fitInto(G.bagL,gift)||fitInto(G.bagR,gift));
    if(room){html+=optBtn('<span class="oe">'+ITEMS[gift].e+'</span><span class="ol">Take the '+ITEMS[gift].n+'!</span><span class="on">free!</span>');
      acts.push(()=>{addToBags(gift,true);Sound.spark();pConfetti();
        outcome(ev,'It’s a '+ITEMS[gift].n+'! Pip stows it with a flourish.',ITEMS[gift].e+' +1',false);});}
    else{html+=optBtn('<span class="oe">😔</span><span class="ol">Bags are full… leave it</span><span class="on">—</span>');
      acts.push(()=>outcome(ev,'You gaze at it longingly and trot on.','',false));}
  }else{
    for(const o of ev.opts){
      if(o.item){
        const has=countItem(o.item)>0,d=ITEMS[o.item];
        html+='<button class="opt"'+(has?'':' disabled')+'><span class="oe">'+d.e+'</span><span class="ol">'+o.label+
          '<small>'+(has?'uses 1 '+d.n:'you didn’t pack a '+d.n)+'</small></span><span class="on">+'+o.coins+'🪙'+(o.heart?' ❤️':'')+'</span></button>';
        acts.push(has?()=>{removeItem(o.item);applyOutcome(ev,o.coins,o.heart||0,o.text);}:null);
      }else if(o.risky){
        const p=riskP();
        html+='<button class="opt risky"><span class="oe">🎲</span><span class="ol">'+o.label+
          '<small>risky — Pip improvises</small></span><span class="on">'+Math.round(p*100)+'%</span></button>';
        acts.push(()=>{
          if(Math.random()<p)applyOutcome(ev,o.good.coins||0,o.good.heart||0,o.good.text,false);
          else applyOutcome(ev,o.bad.coins||0,o.bad.heart||0,o.bad.text,true);
        });
      }else if(o.skip){
        html+='<button class="opt"><span class="oe">💨</span><span class="ol">'+o.label+'</span><span class="on">'+(o.coins?'+'+o.coins+'🪙':'—')+'</span></button>';
        acts.push(()=>applyOutcome(ev,o.coins||0,0,o.text));
      }
    }
  }
  elCard.innerHTML=html;
  elCard.classList.remove('hide');
  const btns=elCard.querySelectorAll('.opt');
  btns.forEach((b,i)=>{if(acts[i])b.addEventListener('click',()=>{Sound.click();acts[i]();});});
  G.curNode=nd;
  if(['rain','cold','dark','bees','river'].includes(nd.ev))G.weather={id:nd.ev,t:1.4};
}
function addToBags(id,silent){
  const bags=bagW(G.bagL)<=bagW(G.bagR)?[G.bagL,G.bagR]:[G.bagR,G.bagL];
  for(const bag of bags){const f=fitInto(bag,id);if(f){bag.places.push(Object.assign({id},f));return true;}}
  if(!silent)showToast('No room!');
  return false;
}
function applyOutcome(ev,coins,heart,text,isBad){
  let big='';
  if(coins>0){G.dayCoins+=coins;G.eventCoins+=coins;
    pCoin(L.jHorse.x,L.jHorse.y-120*L.jHorse.s,Math.min(coins,7));Sound.coin(Math.min(Math.ceil(coins/5),3));
    big='+'+coins+' 🪙';}
  if(heart>0){G.hearts=Math.min(3,G.hearts+heart);Sound.heart();pHeart(L.jHorse.x,L.jHorse.y-160*L.jHorse.s,4);
    big+=(big?'  ':'')+'+❤️';}
  if(heart<0){G.hearts=Math.max(0,G.hearts+heart);Sound.sad();G.shake=0.7;vibe(40);
    big+=(big?'  ':'')+'-❤️';}
  if(isBad&&!big)big='phew…';
  if(heart<0)moodShift(-1);else if(coins>=12||heart>0)moodShift(1);
  const nd=G.curNode;
  if(nd&&nd.ev&&!isBad){
    G.parts.push({tp:'txt',x:L.jHorse.x+130,y:L.jHorse.y-70,vx:70,vy:-170,life:1.0,max:1.0,txt:EVENTS[nd.ev].icon,size:30});
    pSpark(L.jHorse.x+130,L.jHorse.y-80,8);
  }
  outcome(ev,text,big,isBad);
}
function outcome(ev,text,big,isBad){
  elCard.innerHTML='<div class="cicon">'+ev.icon+'</div><h2>'+ev.title+'</h2>'+
    '<div class="outcome">'+text+(big?'<span class="big'+(isBad?' bad':'')+'">'+big+'</span>':'')+'</div>';
  updateTopbar();refreshCoins();
  setTimeout(()=>resumeTrot(G.curNode),1100);
}
function showForkCard(nd){
  const hasMap=countItem('map')>0;
  const evA=EVENTS[G.forkA],evB=EVENTS[G.forkB];
  let html='<div class="cicon">🔀</div><h2>The road forks!</h2><div class="cdesc">'+
    (hasMap?'Pip unfolds the map 🗺️ — both paths revealed!':'Which way? (a 🗺️ Map would reveal what’s ahead…)')+'</div>';
  html+=optBtn('<span class="oe">🌤️</span><span class="ol">Sunny shortcut<small>ahead: '+(hasMap?evA.icon+' '+evA.title:'❓ unknown')+'</small></span><span class="on">go</span>');
  html+=optBtn('<span class="oe">🌿</span><span class="ol">Scenic loop<small>ahead: '+(hasMap?evB.icon+' '+evB.title:'❓ unknown')+'</small></span><span class="on">go</span>');
  elCard.innerHTML=html;elCard.classList.remove('hide');
  const btns=elCard.querySelectorAll('.opt');
  btns[0].addEventListener('click',()=>{Sound.click();pickFork(nd,G.forkA);});
  btns[1].addEventListener('click',()=>{Sound.click();pickFork(nd,G.forkB);});
  G.curNode=nd;
}
function pickFork(nd,ev){
  const next=G.nodes[G.nodes.indexOf(nd)+1];
  if(next&&next.type==='ev')next.ev=ev;
  resumeTrot(nd);
}

/* ---------- arrival & results ---------- */
function arrive(){
  G.jstate='celebrate';G.celT=1.7;
  pConfetti();Sound.fanfare();vibe([30,60,30]);
  showToast(G.region.arrive);
}
function showResults(){
  if(G.state==='results')return; // never double-tally a day
  const rows=[];let total=0;
  // delivery
  const need={};for(const id of G.order)need[id]=(need[id]||0)+1;
  let delivered=0,dCoins=0,missing=0;
  for(const id in need){
    let got=0;
    for(let i=0;i<need[id];i++){if(removeItem(id)){got++;delivered++;}else missing++;}
    if(got>0){const v=got*(16+6*ITEMS[id].w);dCoins+=v;
      rows.push(['📦 Delivered '+ITEMS[id].e+'×'+got,'+'+v]);}
    if(got<need[id])rows.push(['😶 '+ITEMS[id].e+' missing ×'+(need[id]-got),'+0']);
  }
  total+=dCoins;
  if(missing===0&&delivered>0){const sb=20+10*delivered;total+=sb;rows.push(['🎉 Full order bonus','+'+sb]);}
  // odd melons
  let susN=0;while(removeItem('sus'))susN++;
  for(let i=0;i<susN;i++){
    const r=Math.random();
    if(r<0.5){total+=40;rows.push(['🍈 The odd melon had GOLD inside?!','+40']);}
    else if(r<0.8){rows.push(['🍈 The odd melon was full of bees. Bees!','+0']);}
    else{total+=4;rows.push(['🍈 A remarkably normal melon','+4']);}
  }
  // leftovers
  let leftV=0;const leftN=totalItems();
  eachPacked(id=>leftV+=ITEMS[id].sell);
  G.bagL={places:[]};G.bagR={places:[]};
  if(leftN>0){total+=leftV;rows.push(['🧺 Sold '+leftN+' leftover'+(leftN>1?'s':''),'+'+leftV]);}
  // adventures
  if(G.eventCoins>0){total+=G.eventCoins;rows.push(['🗺️ Road adventures','+'+G.eventCoins]);}
  // hearts
  if(!G.rescued&&G.hearts>0){const hb=G.hearts*10;total+=hb;
    rows.push(['❤️ Biscuit’s spirits ×'+G.hearts,'+'+hb]);}
  if(!G.rescued&&G.mood>0){const mb=G.mood*8;total+=mb;
    rows.push([MOODS[G.mood+2]+' Good-mood bonus','+'+mb]);}
  if(G.rescued)rows.push(['🛒 Farmer’s rescue fee','−0 (he refused payment)']);
  rows.push(['total','🪙 '+total]);
  // bank it
  SV.coins+=total;SV.totalEarned+=total;
  if(total>SV.bestDay)SV.bestDay=total;
  if(missing===0&&delivered>0)SV.deliveries++;
  SV.day=G.day+1;save();
  // render
  $('resIcon').textContent=G.rescued?'🛌':'🏁';
  $('resTitle').textContent=G.rescued?'Home safe (barely!)':'Day '+G.day+' complete!';
  const tl=$('resTally');tl.innerHTML='';
  rows.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='trow'+(r[0]==='total'?' total':'');
    div.innerHTML='<span>'+(r[0]==='total'?'TOTAL':r[0])+'</span><span class="tv">'+r[1]+'</span>';
    tl.appendChild(div);
    setTimeout(()=>{div.classList.add('show');if(r[0]==='total'){Sound.fanfare();pCoin(W/2,H/2,8);}else Sound.coin(1);},250+i*260);
  });
  $('resFlavor').textContent=total>=SV.bestDay&&total>30?'★ New best day! Pip does a barrel roll. ★':
    G.rescued?'Biscuit is already asleep. Pip tucks him in.':'Pip counts the coins twice. Biscuit naps.';
  $('resNextBtn').textContent='Start Day '+(G.day+1)+' ▶';
  G.state='results';
  hideAll();updateTopbar();
  $('results').classList.remove('hide');
}
$('resNextBtn').addEventListener('click',()=>{Sound.click();G.day=SV.day;startDay();});
$('resShopBtn').addEventListener('click',()=>{openShop('results');});

/* ---------- shop ---------- */
const TABS=[['coat','🐴 Coat'],['mane','💇 Mane'],['blanket','🧺 Blanket'],['beak','🪶 Beak'],['hat','🎩 Hats'],['trail','✨ Trail'],['gear','🎒 Gear']];
function openShop(from){
  Sound.click();shopReturn=from;
  G.prevState=G.state;G.state='shop';
  hideAll();
  updateTopbar();updateDepartBtn();
  $('shop').classList.remove('hide');
  renderShopTabs();renderShop();
}
function closeShop(){
  Sound.click();$('shop').classList.add('hide');
  if(shopReturn==='results'){G.state='results';$('results').classList.remove('hide');updateTopbar();}
  else{G.state='title';updateTitleUI();$('title').classList.remove('hide');}
}
$('shopClose').addEventListener('click',closeShop);
function renderShopTabs(){
  const t=$('tabs');t.innerHTML='';
  for(const[id,label]of TABS){
    const b=document.createElement('button');
    b.className='tab'+(shopTab===id?' on':'');b.textContent=label;
    b.addEventListener('click',()=>{Sound.click();shopTab=id;renderShopTabs();renderShop();});
    t.appendChild(b);
  }
}
function shopSets(){return{coat:COATS,mane:MANES,blanket:BLANKETS,beak:BEAKS,hat:HATS,trail:TRAILS};}
function renderShop(){
  $('shopCoins').textContent='🪙 '+SV.coins;
  const g=$('shopGrid');g.innerHTML='';
  if(shopTab==='gear'){
    g.classList.add('rows');
    for(const id in GEAR){
      const gr=GEAR[id],lv=SV.gear[id],maxed=lv>=gr.max;
      const price=maxed?0:gr.price[lv];
      const row=document.createElement('div');row.className='gearrow';
      row.innerHTML='<div class="ge">'+gr.e+'</div><div class="gi"><div class="nm">'+gr.n+
        (gr.max>1?' <span style="color:#a8703a;font-size:12px;">'+lv+'/'+gr.max+'</span>':'')+
        '</div><div class="ds">'+gr.ds(maxed?lv:lv+1)+'</div></div>'+
        '<button '+(maxed||SV.coins<price?'disabled':'')+'>'+(maxed?'MAX ✓':'🪙 '+price)+'</button>';
      row.querySelector('button').addEventListener('click',()=>{
        if(maxed||SV.coins<price)return;
        SV.coins-=price;SV.gear[id]++;save();Sound.fanfare();pSpark(W/2,H*0.5,10);computeLayout();renderShop();
      });
      g.appendChild(row);
    }
    return;
  }
  g.classList.remove('rows');
  const set=shopSets()[shopTab];
  for(const id in set){
    const it=set[id];
    const owned=SV.owned[shopTab].includes(id),eq=SV.eq[shopTab]===id;
    const cell=document.createElement('div');
    cell.className='cell'+(eq?' eq':owned?'':' locked')+(!owned&&SV.coins<it.price?' cant':'');
    let sw;
    if(shopTab==='hat'||shopTab==='trail')sw='<div class="se">'+it.e+'</div>';
    else sw='<div class="sw" style="background:'+(it.pat==='rainbow'?'linear-gradient(135deg,'+RAINBOW.join(',')+')':it.a)+';"></div>';
    cell.innerHTML=sw+'<div class="nm">'+it.n+'</div><div class="pr">'+(eq?'WEARING ✓':owned?'tap to wear':'🪙 '+it.price)+'</div>';
    cell.addEventListener('click',()=>{
      if(eq)return;
      if(owned){SV.eq[shopTab]=id;save();Sound.pop();renderShop();return;}
      if(SV.coins<it.price){Sound.err();showToast('Not enough coins — run more deliveries!');return;}
      SV.coins-=it.price;SV.owned[shopTab].push(id);SV.eq[shopTab]=id;save();
      Sound.fanfare();pConfetti();renderShop();
    });
    g.appendChild(cell);
  }
}

/* ---------- title & boot ---------- */
function hideAll(keepResults){
  $('title').classList.add('hide');
  if(!keepResults)$('results').classList.add('hide');
  $('shop').classList.add('hide');
  elCard.classList.add('hide');elHint.classList.add('hide');
}
function updateTitleUI(){
  $('startBtn').innerHTML='▶ &nbsp;Start Day '+SV.day;
  $('soundBtn').innerHTML=SV.mute?'🔇 &nbsp;Sound Off':'🔊 &nbsp;Sound On';
  $('titleStats').innerHTML=SV.bestDay>0?
    'Best day: 🪙 '+SV.bestDay+' &nbsp;•&nbsp; Orders delivered: '+SV.deliveries+'<br>Wallet: 🪙 '+SV.coins:
    'A toucan packs. A horse trots.<br>Adventures happen.';
}
$('startBtn').addEventListener('click',()=>{Sound.ensure();Sound.click();G.day=SV.day;startDay();});
$('wardrobeBtn').addEventListener('click',()=>{Sound.ensure();openShop('title');});
$('soundBtn').addEventListener('click',()=>{Sound.ensure();toggleMute();});

/* debug hooks (harmless in production) */
window.__sb={G,L,SV,tap:handleTap,depart:()=>depart(false),startDay,showResults};

resize();
updateTitleUI();
requestAnimationFrame(frame);
</script>
