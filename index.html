<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFE3A3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Saddlebags — Pip &amp; Biscuit's Delivery Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>

  <div id="topbar" class="hide">
    <div class="tbrow" id="tbTop"></div>
    <div class="tbrow" id="tbSub"></div>
    <div id="patwrap" class="hide"><div id="patbar"></div></div>
  </div>

  <button id="departBtn" class="bigbtn green hide">DEPART ▶</button>
  <div id="hint" class="hide"></div>
  <div id="toast"></div>

  <div id="title" class="screen">
    <div style="margin-top:calc(var(--safeT) + 12px);text-align:center;">
      <h1 class="logo">🪶 SADDLE<br>BAGS 🐴</h1>
      <div class="tagline">Pip &amp; Biscuit's Delivery Co.</div>
    </div>
    <div style="flex:1"></div>
    <div style="width:min(300px,86%);margin-bottom:calc(var(--safeB) + 18px);">
      <div class="statline" id="titleStats"></div>
      <button class="bigbtn" id="startBtn">▶ &nbsp;Start Day 1</button>
      <button class="bigbtn small" id="wardrobeBtn" style="background:linear-gradient(#EEC6F7,#CE8BE0);box-shadow:0 5px 0 #9b5cb0,0 8px 14px rgba(0,0,0,.22);color:#4d1560;">🛍️ &nbsp;Wardrobe</button>
      <button class="bigbtn small" id="soundBtn" style="background:linear-gradient(#CDEBFF,#8FC9EE);box-shadow:0 5px 0 #5b93bd,0 8px 14px rgba(0,0,0,.22);color:#0e3a5c;">🔊 &nbsp;Sound On</button>
    </div>
  </div>

  <div id="card" class="hide"></div>

  <div id="results" class="screen dim hide">
    <div class="panel">
      <div style="font-size:40px;" id="resIcon">🏁</div>
      <h2 style="font-size:22px;color:var(--ink2);" id="resTitle">Delivery complete!</h2>
      <div class="tally" id="resTally"></div>
      <div class="flavor" id="resFlavor"></div>
      <button class="bigbtn" id="resNextBtn">Next Day ▶</button>
      <button class="bigbtn small" id="resShopBtn" style="background:linear-gradient(#EEC6F7,#CE8BE0);box-shadow:0 5px 0 #9b5cb0;color:#4d1560;">🛍️ Wardrobe</button>
    </div>
  </div>

  <div id="shop" class="hide">
    <div id="shopHead">
      <h2>🛍️ Wardrobe</h2>
      <div id="shopCoins">🪙 0</div>
      <button id="shopClose">Done ✓</button>
    </div>
    <div id="tabs"></div>
    <div id="shopGrid"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script src="game.js"></script>
</body>
</html>
